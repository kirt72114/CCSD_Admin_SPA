function saveSeatEdit(){
  var seatId = APP.modalState.editSeatId;
  if (!seatId) { return; }
  var seatLabel = document.getElementById('editSeatLabel').value;
  var roomId = document.getElementById('editSeatRoom').value;
  var errors = runValidation([function(){ return validateRequired(seatLabel, 'Seat Label'); }]);
  if (showValidationErrors(errors)) { return; }
  var personId = document.getElementById('editSeatPerson').value;
  var values = {
    Title: seatLabel,
    SeatLabel: seatLabel,
    SeatStatus: personId ? 'Occupied' : 'Available',
    PortNumber: document.getElementById('editSeatPort').value,
    PhoneNumber: document.getElementById('editSeatPhone').value,
    HasNIPR: document.getElementById('editSeatNIPR').value === 'Yes',

    HasJWICS: document.getElementById('editSeatJWICS').value === 'Yes',

    Notes: document.getElementById('editSeatNotes').value
  };
  if (roomId) { values.RoomID = parseInt(roomId, 10); }
  if (personId) { values.CurrentPersonID = parseInt(personId, 10); } else { values.CurrentPersonID = null; }

function deleteSeat(seatId){

  }).catch(function(){ toast('Delete failed.', 'danger'); });
}
function saveSeatPosition(seatId, x, y){
  updateListItem(APP.lists.Seats, seatId, { XCoord: String(x), YCoord: String(y) }, { entityType: 'Seat', reason: 'Drag reposition' }).then(function(){
    toast('Seat repositioned to (' + x + ', ' + y + ').', 'ok');
    var seats = APP.state.data.seats || [];
    for (var i = 0; i < seats.length; i++) { if (String(seats[i].Id) === String(seatId)) { seats[i].XCoord = String(x); seats[i].YCoord = String(y); break; } }
  }).catch(function(){ toast('Reposition failed — refresh to see actual position.', 'danger'); });
}
function highlightSeatOnMap(seatId, x, y){
  if (x === '' || x == null) { toast('This seat is not placed on the map yet.', 'warn'); return; }
  var marker = document.querySelector('.seat-marker[data-seat-id="' + seatId + '"]');
  if (!marker) { return; }
  var ui = ensureFacilityUi();
  var container = document.getElementById('floorplanContainer');
  if (!container) { return; }
  var cw = container.clientWidth; var ch = container.clientHeight;
  ui.panX = (cw / 2) - (Number(x) * ui.zoom);
  ui.panY = (ch / 2) - (Number(y) * ui.zoom);
  applyFloorPlanTransform();
  var prev = document.querySelector('.seat-marker.selected');
  if (prev) { prev.classList.remove('selected'); }
  marker.classList.add('selected');
  setTimeout(function(){ marker.classList.remove('selected'); }, 2000);
}
function filterSeatSidebar(query){

  for (var i = 0; i < items.length; i++) {
    var text = items[i].textContent.toLowerCase();
    items[i].style.display = text.indexOf(q) !== -1 ? '' : 'none';
  }
}
function getNextSeatLabel(){
  var seats = APP.state.data.seats || [];
  var ui = ensureFacilityUi();
  var facilitySeats = seats.filter(function(s){
    if (ui.selectedRoomId) { return s.RoomID && (s.RoomID.Id || s.RoomID) == ui.selectedRoomId; }
    return true;
  });
  var maxNum = 0;
  facilitySeats.forEach(function(s){
    var label = s.SeatLabel || '';
    var m = label.match(/(\d+)\s*$/);
    if (m) { var n = parseInt(m[1], 10); if (n > maxNum) { maxNum = n; } }
  });
  return String(maxNum + 1);
}

function envDisplayLabel(value){
  var t = String(value || '').toLowerCase();
  if (!t) { return 'Not Tagged'; }
  if (t.indexOf('jwics') >= 0 || t.indexOf('top secret') >= 0) { return 'Top Secret / JWICS'; }
  if (t.indexOf('sipr') >= 0 || t.indexOf('secret') >= 0) { return 'Secret Network'; }

function deriveSeatCapabilityLabel(seat){
  if (!seat) { return ''; }

  if (normalizeBoolean(seat.HasNIPR)) { out.push('Unclassified Network'); }
  if (normalizeBoolean(seat.HasSIPR)) { out.push('Secret Network'); }
  if (normalizeBoolean(seat.HasJWICS)) { out.push('Top Secret / JWICS'); }
  return out.join(' • ');
}

  };

/* ─── Asset Depreciation / Age Tracking ─── */
var USEFUL_LIFE_YEARS = { Laptop: 5, Desktop: 7, Monitor: 7, Printer: 7, Phone: 5, Tablet: 4, Server: 7, 'Network Equipment': 7 };
function getAssetAge(asset){
  if (!asset.PurchaseDate) { return null; }
  var purchase = new Date(asset.PurchaseDate);
  var now = new Date();
  var years = (now - purchase) / (365.25 * 86400000);
  return Math.round(years * 10) / 10;
}
function isAssetPastUsefulLife(asset){
  var age = getAssetAge(asset);
  if (age == null) { return false; }
  var type = asset.AssetType || asset.HardwareType || '';
  var life = USEFUL_LIFE_YEARS[type] || 6;
  return age > life;
}
function renderAssetDepreciation(){
  var idx = buildAssetIndex();
  var hw = idx.hwAssets || [];
  var aging = hw.filter(function(a){ return getAssetAge(a) != null; }).map(function(a){
    var age = getAssetAge(a);
    var type = a.AssetType || a.HardwareType || 'Unknown';
    return { asset: a, age: age, type: type, pastLife: isAssetPastUsefulLife(a) };
  }).sort(function(a, b){ return b.age - a.age; });
  var pastCount = aging.filter(function(a){ return a.pastLife; }).length;
  var body = '<div style="margin-bottom:12px"><strong>' + pastCount + '</strong> assets past useful life out of <strong>' + aging.length + '</strong> with purchase dates.</div>';
  body += '<table class="table-wrap" style="width:100%;font-size:11px"><thead><tr><th>Asset</th><th>Type</th><th>Age (years)</th><th>Status</th></tr></thead><tbody>';
  aging.slice(0, 50).forEach(function(a){
    var color = a.pastLife ? 'var(--danger)' : a.age > 4 ? 'var(--warn)' : 'var(--ok)';
    body += '<tr><td>' + escHtml(getHardwareDisplayName(a.asset)) + '</td><td>' + escHtml(a.type) + '</td><td style="color:' + color + ';font-weight:700">' + a.age + '</td><td>' + statusBadge(a.pastLife ? 'Past Life' : 'Active') + '</td></tr>';
  });
  body += '</tbody></table>';
  openModal('Asset Depreciation / Age Tracking', body, '<div></div><button class="btn" data-action="close-modal">Close</button>');
}

function renderInventoryDiscrepancies(){
  var idx = buildAssetIndex();
  var people = APP.state.data.people || [];

  people.forEach(function(p){ if (String(p.Status || '').toLowerCase().indexOf('depart') >= 0) { departed[p.Id] = p; } });
  var issues = [];
  /* Assets assigned to departed personnel */
  (idx.hwAssignments || []).forEach(function(a){
    if (!isActiveHardwareAssignment(a)) { return; }
    var pid = a.PersonID ? (a.PersonID.Id || a.PersonID) : null;
    if (pid && departed[pid]) { issues.push({ type: 'Departed Assignee', asset: getHardwareDisplayName(a.HardwareAssetID || {}), person: formatPerson(departed[pid]) }); }
  });
  /* Hardware with no active assignment and status = Assigned */
  (idx.hwAssets || []).forEach(function(a){
    if (String(a.Status || '').toLowerCase() !== 'assigned') { return; }
    var hasActive = (idx.hwAssignments || []).some(function(asgn){ return isActiveHardwareAssignment(asgn) && asgn.HardwareAssetID && String(asgn.HardwareAssetID.Id || asgn.HardwareAssetID) === String(a.Id); });
    if (!hasActive) { issues.push({ type: 'Ghost Assignment', asset: getHardwareDisplayName(a), person: '(no active assignment found)' }); }
  });
  var body = '<div style="margin-bottom:12px"><strong>' + issues.length + '</strong> discrepancies found.</div>';
  if (!issues.length) { body += '<div class="empty">No discrepancies detected. All assignments look clean.</div>'; }
  else {
    body += '<table class="table-wrap" style="width:100%;font-size:11px"><thead><tr><th>Issue</th><th>Asset</th><th>Person</th></tr></thead><tbody>';
    issues.forEach(function(i){
      body += '<tr><td>' + statusBadge(i.type) + '</td><td>' + escHtml(i.asset) + '</td><td>' + escHtml(i.person) + '</td></tr>';
    });

}

/* ─── Calendar Data Helpers ─── */
function getCalendarEntries(ui){
  var entries = (APP.state.data.timeOff || []).filter(function(e){
    var s = String(e.Status || '').toLowerCase();
    return s === 'approved' || s === 'pending' || s === 'denied';
  });
  var people = APP.state.data.people || [];
  var peopleById = {};
  people.forEach(function(p){ peopleById[p.Id] = p; });
  /* Org scope filter: include self + descendants */
  if (ui.scopeOrgId) {
    var orgIds = getOrgAndDescendants(ui.scopeOrgId);
    entries = entries.filter(function(e){
      if (!e.PersonID) { return false; }
      var pid = e.PersonID.Id || e.PersonID;
      var person = peopleById[pid];
      if (!person) { return false; }
      var pOrgId = person.OrgID ? (person.OrgID.Id || person.OrgID) : null;
      return pOrgId && orgIds[pOrgId];
    });
  }
  /* Type filter */
  if (ui.typeFilter) {
    entries = entries.filter(function(e){ return e.TimeOffType === ui.typeFilter; });
  }
  /* Search filter */
  if (ui.search) {
    var q = ui.search.toLowerCase();
    entries = entries.filter(function(e){
      var name = e.PersonID && e.PersonID.Title ? e.PersonID.Title : '';
      return name.toLowerCase().indexOf(q) >= 0;
    });
  }
  return entries;
}

function getOrgAndDescendants(orgId){
  var orgs = APP.state.data.organizations || [];
  var childMap = {};
  orgs.forEach(function(o){
    var pid = o.ParentOrgID ? (o.ParentOrgID.Id || o.ParentOrgID) : null;
    if (pid) {
      if (!childMap[pid]) { childMap[pid] = []; }
      childMap[pid].push(o.Id);
    }
  });
  var result = {};
  var stack = [orgId];
  while (stack.length) {
    var id = stack.pop();
    result[id] = true;
    (childMap[id] || []).forEach(function(cid){ if (!result[cid]) { stack.push(cid); } });
  }
  return result;
}

function entriesForDateRange(entries, startDate, endDate){
  var result = [];
  entries.forEach(function(e){
    var s = new Date(e.StartDate); var ed = new Date(e.EndDate || e.StartDate);
    s.setHours(0,0,0,0); ed.setHours(23,59,59,999);
    if (s <= endDate && ed >= startDate) { result.push(e); }
  });
  return result;
}

function entriesForDate(entries, date){
  var ds = date.toISOString().slice(0, 10);
  return entries.filter(function(e){
    var s = (e.StartDate || '').slice(0, 10);
    var ed = (e.EndDate || e.StartDate || '').slice(0, 10);
    return ds >= s && ds <= ed;
  });
}

/* ─── Month View ─── */
function renderCalendarMonth(ui){
  var entries = getCalendarEntries(ui);
  var holidays = getHolidayMap(ui.year);
  /* Also get prev/next month holidays for edge days */
  if (ui.month === 0) { Object.assign(holidays, getHolidayMap(ui.year - 1)); }
  if (ui.month === 11) { Object.assign(holidays, getHolidayMap(ui.year + 1)); }
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0, 10);
  var first = new Date(ui.year, ui.month, 1);
  var startDay = first.getDay(); /* 0=Sun */
  var daysInMonth = new Date(ui.year, ui.month + 1, 0).getDate();
  /* Fill grid from Sunday before month start */
  var gridStart = new Date(first); gridStart.setDate(gridStart.getDate() - startDay);
  var totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
  var html = '<div class="cal-month">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){ html += '<div class="cal-month-head">' + d + '</div>'; });
  for (var i = 0; i < totalCells; i++) {
    var dt = new Date(gridStart); dt.setDate(dt.getDate() + i);
    var ds = dt.toISOString().slice(0, 10);
    var isOutside = dt.getMonth() !== ui.month;
    var isToday = ds === todayStr;
    var isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
    var cls = 'cal-day';
    if (isOutside) { cls += ' outside'; }
    if (isToday) { cls += ' today'; }
    if (isWeekend) { cls += ' weekend'; }
    html += '<div class="' + cls + '">';
    html += '<div class="cal-day-num">' + dt.getDate() + '</div>';
    /* Holiday */
    var hol = holidays[ds];
    if (hol) { html += '<div class="cal-holiday-label">' + escHtml(hol) + '</div>'; }
    /* Entries for this day */
    html += '<div class="cal-day-entries">';
    var dayEntries = entriesForDate(entries, dt);
    dayEntries.slice(0, 4).forEach(function(e){
      var t = getCalType(e.TimeOffType);
      var name = e.PersonID && e.PersonID.Title ? e.PersonID.Title.split(',')[0] : 'Unknown';
      var entryStatus = String(e.Status || '').toLowerCase();
      var entryStyle = entryStatus === 'pending' ? 'opacity:.5;border:1px dashed rgba(255,255,255,.3)' : entryStatus === 'denied' ? 'opacity:.35;text-decoration:line-through' : '';
      html += '<div class="cal-entry ' + t.key + '" data-action="cal-entry-detail" data-entry-id="' + escAttr(e.Id) + '" title="' + escAttr(name + ' – ' + (e.TimeOffType || 'Time Off') + (entryStatus !== 'approved' ? ' (' + entryStatus + ')' : '')) + '" style="' + entryStyle + '">' + escHtml(name) + '</div>';
    });
    if (dayEntries.length > 4) {
      html += '<div class="cal-entry other" style="text-align:center;font-size:8px">+' + (dayEntries.length - 4) + ' more</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

/* ─── Week View ─── */
function renderCalendarWeek(ui){
  if (!ui.weekStart) {
    var now = new Date(); now.setHours(0,0,0,0);
    ui.weekStart = new Date(now); ui.weekStart.setDate(now.getDate() - now.getDay());
  }
  var entries = getCalendarEntries(ui);
  var holidays = getHolidayMap(ui.weekStart.getFullYear());
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0, 10);
  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var html = '<div class="cal-week">';
  html += '<div class="cal-week-header">';
  for (var d = 0; d < 7; d++) {
    var dt = new Date(ui.weekStart); dt.setDate(dt.getDate() + d);
    var ds = dt.toISOString().slice(0, 10);
    html += '<div class="cal-week-head' + (ds === todayStr ? ' today' : '') + '"><div class="day-name">' + dayNames[d].slice(0, 3) + '</div><div class="day-num">' + dt.getDate() + '</div></div>';
  }
  html += '</div>';
  html += '<div class="cal-week-body">';
  for (var d = 0; d < 7; d++) {
    var dt = new Date(ui.weekStart); dt.setDate(dt.getDate() + d);
    var ds = dt.toISOString().slice(0, 10);
    var isToday = ds === todayStr;
    html += '<div class="cal-week-col' + (isToday ? ' today' : '') + '">';
    var hol = holidays[ds];
    if (hol) { html += '<div class="cal-week-entry holiday" style="background:rgba(255,111,142,.1)"><div class="entry-name" style="color:#ff6f8e">' + escHtml(hol) + '</div><div class="entry-type">Federal Holiday</div></div>'; }
    var dayEntries = entriesForDate(entries, dt);
    dayEntries.forEach(function(e){
      var t = getCalType(e.TimeOffType);

      html += '<div class="cal-week-entry ' + t.key + '" style="background:' + t.color + '15" data-action="cal-entry-detail" data-entry-id="' + escAttr(e.Id) + '"><div class="entry-name">' + escHtml(name) + '</div><div class="entry-type">' + escHtml(e.TimeOffType || 'Time Off') + (e.Hours ? ' (' + e.Hours + 'h)' : '') + '</div></div>';

  }
  html += '</div></div>';

}

/* ─── List View ─── */
function renderCalendarList(ui){
  var entries = getCalendarEntries(ui);
  var first = new Date(ui.year, ui.month, 1);
  var last = new Date(ui.year, ui.month + 1, 0);
  last.setHours(23,59,59,999);
  var monthEntries = entriesForDateRange(entries, first, last);
  var holidays = getFederalHolidays(ui.year).filter(function(h){ return h.date >= first && h.date <= last; });
  /* Merge into a combined list sorted by date */
  var combined = [];
  monthEntries.forEach(function(e){
    var sd = new Date(e.StartDate); sd.setHours(0,0,0,0);
    var startInMonth = sd < first ? first : sd;
    combined.push({ date: startInMonth, type: 'entry', data: e });
  });
  holidays.forEach(function(h){
    combined.push({ date: h.date, type: 'holiday', data: h });
  });
  combined.sort(function(a, b){ return a.date - b.date; });
  if (!combined.length) { return '<div class="empty">No time-off entries or holidays this month.</div>'; }
  var html = '<div class="cal-list">';
  var lastDateStr = '';
  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  combined.forEach(function(item){
    var ds = item.date.toISOString().slice(0, 10);
    if (ds !== lastDateStr) {
      lastDateStr = ds;
      html += '<div class="cal-list-day">' + dayNames[item.date.getDay()] + ', ' + monthNames[item.date.getMonth()] + ' ' + item.date.getDate() + '</div>';
    }
    if (item.type === 'holiday') {
      html += '<div class="cal-list-item"><div class="swatch" style="background:#ff6f8e"></div><div class="info"><div class="name">' + escHtml(item.data.name) + '</div><div class="meta">Federal Holiday</div></div><div class="type-badge" style="background:rgba(255,111,142,.12);color:#ff6f8e">Holiday</div></div>';
    } else {
      var e = item.data;
      var t = getCalType(e.TimeOffType);
      var name = e.PersonID && e.PersonID.Title ? e.PersonID.Title : 'Unknown';
      var sd = (e.StartDate || '').slice(0, 10);
      var ed = (e.EndDate || e.StartDate || '').slice(0, 10);
      var dateRange = sd === ed ? sd : sd + ' to ' + ed;
      html += '<div class="cal-list-item" data-action="cal-entry-detail" data-entry-id="' + escAttr(e.Id) + '"><div class="swatch" style="background:' + t.color + '"></div><div class="info"><div class="name">' + escHtml(name) + '</div><div class="meta">' + escHtml(dateRange) + (e.Hours ? ' &middot; ' + e.Hours + 'h' : '') + (e.Notes ? ' &middot; ' + escHtml(e.Notes.substring(0, 60)) : '') + '</div></div><div class="type-badge" style="background:' + t.color + '18;color:' + t.color + '">' + escHtml(e.TimeOffType || 'Other') + '</div></div>';
    }
  });
  html += '</div>';
  return html;
}

/* ─── Senior Leaders Calendar ─── */
function renderSeniorLeadersView(ui){
  var positions = APP.state.data.positions || [];
  var people = APP.state.data.people || [];
  var entries = getCalendarEntries({ scopeOrgId: null, typeFilter: ui.typeFilter, search: '' });
  var holidays = getHolidayMap(ui.year);
  /* Find key leadership: IsKeyLeadership positions */
  var leaderPositionIds = {};
  positions.forEach(function(pos){
    if (normalizeBoolean(pos.IsKeyLeadership)) { leaderPositionIds[pos.Id] = pos; }
  });
  var leaders = people.filter(function(p){
    if (p.Status && p.Status !== 'Active') { return false; }
    var posId = p.PositionID ? (p.PositionID.Id || p.PositionID) : null;
    return posId && leaderPositionIds[posId];
  });
  if (!leaders.length) {
    /* Fallback: supervisors */
    leaders = people.filter(function(p){
      return p.Status === 'Active' && normalizeBoolean(p.IsSupervisor);
    });
  }
  leaders.sort(function(a, b){ return (a.LastName || '').localeCompare(b.LastName || ''); });
  /* Time window: current week + next 2 weeks */
  var now = new Date(); now.setHours(0,0,0,0);
  var weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  var windowEnd = new Date(weekStart); windowEnd.setDate(windowEnd.getDate() + 20);
  var html = '<div style="margin-bottom:8px;font-size:12px;color:var(--muted)">Showing key leadership schedules for the next 3 weeks</div>';
  html += '<div class="cal-leaders">';
  leaders.forEach(function(person){
    var posId = person.PositionID ? (person.PositionID.Id || person.PositionID) : null;
    var pos = leaderPositionIds[posId] || {};
    var personEntries = entries.filter(function(e){
      var pid = e.PersonID ? (e.PersonID.Id || e.PersonID) : null;
      return pid && pid == person.Id;
    });
    var windowEntries = entriesForDateRange(personEntries, weekStart, windowEnd);
    /* Determine current status */
    var todayEntries = entriesForDate(personEntries, now);
    var todayHol = holidays[now.toISOString().slice(0, 10)];
    var currentStatus = 'In Office';
    var statusStyle = 'background:rgba(109,240,182,.12);color:#6df0b6';
    if (todayHol) { currentStatus = 'Holiday'; statusStyle = 'background:rgba(255,111,142,.12);color:#ff6f8e'; }
    else if (todayEntries.length) {
      var te = todayEntries[0];
      var tt = getCalType(te.TimeOffType);
      currentStatus = te.TimeOffType || 'Out';
      statusStyle = 'background:' + tt.color + '18;color:' + tt.color;
    }
    html += '<div class="cal-leader-card">';
    html += '<div class="ldr-head"><div style="flex:1"><div class="ldr-name">' + escHtml(person.LastName + ', ' + person.FirstName) + '</div><div class="ldr-role">' + escHtml(pos.PositionTitle || person.Grade || '') + '</div></div><div class="ldr-status" style="' + statusStyle + '">' + escHtml(currentStatus) + '</div></div>';
    html += '<div class="ldr-entries">';
    if (!windowEntries.length) {
      html += '<div style="font-size:11px;color:var(--muted);padding:4px 0">No upcoming time off</div>';
    }
    windowEntries.slice(0, 5).forEach(function(e){
      var t = getCalType(e.TimeOffType);
      var sd = (e.StartDate || '').slice(0, 10);
      var ed = (e.EndDate || e.StartDate || '').slice(0, 10);
      html += '<div class="ldr-entry" style="background:' + t.color + '10"><span style="color:' + t.color + ';font-weight:700">' + escHtml(e.TimeOffType || 'Off') + '</span><span class="dates">' + sd + (sd !== ed ? ' – ' + ed : '') + '</span></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ─── Calendar Navigation Helpers ─── */
function calNavigate(direction){
  var ui = ensureCalendarUi();
  if (ui.view === 'week') {
    if (!ui.weekStart) { var n = new Date(); n.setHours(0,0,0,0); ui.weekStart = new Date(n); ui.weekStart.setDate(n.getDate() - n.getDay()); }
    var delta = direction === 'next' ? 7 : -7;
    ui.weekStart.setDate(ui.weekStart.getDate() + delta);
    ui.year = ui.weekStart.getFullYear();
    ui.month = ui.weekStart.getMonth();
  } else {
    if (direction === 'next') {
      ui.month += 1;
      if (ui.month > 11) { ui.month = 0; ui.year += 1; }
    } else {
      ui.month -= 1;
      if (ui.month < 0) { ui.month = 11; ui.year -= 1; }
    }
  }
  renderCalendar();
}
function calToday(){
  var ui = ensureCalendarUi();
  var now = new Date();
  ui.year = now.getFullYear();
  ui.month = now.getMonth();
  if (ui.view === 'week') {
    ui.weekStart = new Date(now); ui.weekStart.setHours(0,0,0,0);
    ui.weekStart.setDate(now.getDate() - now.getDay());
  }
  renderCalendar();
}

/* ─── Calendar: Export to ICS ─── */
function exportCalendarICS(){
  var ui = ensureCalendarUi();
  var entries = getCalendarEntries(ui);
  var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CCSD Admin SPA//EN\r\n';
  entries.forEach(function(e){
    var name = e.PersonID && e.PersonID.Title ? e.PersonID.Title : 'Unknown';
    var start = (e.StartDate || '').slice(0,10).replace(/-/g, '');
    var end = (e.EndDate || e.StartDate || '').slice(0,10).replace(/-/g, '');
    /* ICS DTEND for all-day is exclusive, so add 1 day */
    var endDt = new Date((e.EndDate || e.StartDate || '').slice(0,10));
    endDt.setDate(endDt.getDate() + 1);
    var endStr = endDt.toISOString().slice(0,10).replace(/-/g, '');
    ics += 'BEGIN:VEVENT\r\n';
    ics += 'DTSTART;VALUE=DATE:' + start + '\r\n';
    ics += 'DTEND;VALUE=DATE:' + endStr + '\r\n';
    ics += 'SUMMARY:' + (e.TimeOffType || 'Time Off') + ' - ' + name + '\r\n';
    ics += 'DESCRIPTION:' + (e.Notes || '').replace(/[\r\n]/g, '\\n') + '\r\n';
    ics += 'UID:' + (e.Id || Math.random()) + '@ccsd-spa\r\n';
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';
  var blob = new Blob([ics], { type: 'text/calendar' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'calendar_export_' + ui.year + '-' + String(ui.month + 1).padStart(2, '0') + '.ics';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Calendar exported to ICS.', 'ok');
}

/* ─── Calendar: Upcoming Time Off for Home ─── */
function getUpcomingTimeOff(daysAhead){
  daysAhead = daysAhead || 7;
  var now = new Date(); now.setHours(0,0,0,0);
  var cutoff = new Date(now.getTime() + daysAhead * 86400000);
  var me = APP.state.currentPersonnel;
  if (!me) { return []; }
  return (APP.state.data.timeOff || []).filter(function(e){
    var pid = e.PersonID ? (e.PersonID.Id || e.PersonID) : null;
    if (String(pid) !== String(me.Id)) { return false; }
    var sd = new Date((e.StartDate || '').slice(0,10));
    return sd >= now && sd <= cutoff;
  });
}

/* ─── Sortable Table Headers ─── */
function initSortableHeaders(){
  document.addEventListener('click', function(e){
    var th = e.target.closest ? e.target.closest('th[data-sort]') : null;
    if (!th) { var el = e.target; while (el && el.tagName !== 'TH') { el = el.parentNode; } if (el && el.getAttribute && el.getAttribute('data-sort')) { th = el; } }
    if (!th) { return; }
    var col = th.getAttribute('data-sort');
    var table = th.closest ? th.closest('table') : th.parentNode && th.parentNode.parentNode && th.parentNode.parentNode.parentNode;
    if (!table || !table.tBodies || !table.tBodies[0]) { return; }
    var tbody = table.tBodies[0];
    var rows = Array.prototype.slice.call(tbody.rows);
    var idx = Array.prototype.slice.call(th.parentNode.children).indexOf(th);
    var asc = !th.classList.contains('sort-asc');
    var ths = th.parentNode.querySelectorAll('th[data-sort]');
    for (var i = 0; i < ths.length; i++) { ths[i].classList.remove('sort-asc','sort-desc'); }
    th.classList.add(asc ? 'sort-asc' : 'sort-desc');
    rows.sort(function(a, b){
      var aVal = (a.cells[idx] && a.cells[idx].textContent || '').trim().toLowerCase();
      var bVal = (b.cells[idx] && b.cells[idx].textContent || '').trim().toLowerCase();
      var aNum = parseFloat(aVal); var bNum = parseFloat(bVal);
      if (!isNaN(aNum) && !isNaN(bNum)) { return asc ? aNum - bNum : bNum - aNum; }
      var aDate = Date.parse(aVal); var bDate = Date.parse(bVal);
      if (!isNaN(aDate) && !isNaN(bDate)) { return asc ? aDate - bDate : bDate - aDate; }
      return asc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });
}

  var incomplete = caseSteps.filter(function(s){ return String(s.Status || '').toLowerCase().indexOf('complete') < 0; });
  var nextStep = incomplete.length ? (incomplete[0].Title || 'Step ' + (incomplete[0].StepNumber || '')) : 'All Steps Completed';

  updateListItem(APP.lists.InOut, caseId, update, { entityType: 'In/Out Case', before: caseRow, reason: 'Auto-advance from step completion' }).then(function(){

/* ─── Supervisor Team Training Dashboard ─── */
function getTeamTrainingModel(){
  var people = APP.state.data.people || [];
  var currentPerson = APP.state.currentPersonnel;
  if (!currentPerson) { return []; }
  var currentOrgId = currentPerson.OrgID && currentPerson.OrgID.Id ? currentPerson.OrgID.Id : null;
  var team = people.filter(function(p){
    if (p.Id === currentPerson.Id) { return false; }
    if (p.SupervisorID && p.SupervisorID.Id === currentPerson.Id) { return true; }
    if (currentOrgId && p.OrgID && p.OrgID.Id === currentOrgId) { return true; }
    return false;
  });
  var catalog = APP.state.data.trainingCatalog || [];
  var records = APP.state.data.trainingRecords || [];
  return team.map(function(p){
    var applicable = catalog.filter(function(t){ return normalizeBoolean(t.Required); });
    var personRecords = records.filter(function(r){ return r.PersonID && r.PersonID.Id === p.Id; });
    var current = 0; var expired = 0; var missing = 0;
    applicable.forEach(function(t){
      var rec = null;
      personRecords.some(function(r){ if (r.TrainingID && r.TrainingID.Id === t.Id) { rec = r; return true; } return false; });
      if (!rec) { missing++; return; }
      var s = String(rec.Status || '').toLowerCase();
      if (s.indexOf('current') >= 0) { current++; }
      else if (s.indexOf('expired') >= 0) { expired++; }
      else { current++; }
    });
    var total = applicable.length;
    var pct = total ? Math.round((current / total) * 100) : 100;
    return { person: p, total: total, current: current, expired: expired, missing: missing, pct: pct };
  });
}
function renderTeamTraining(){
  var model = getTeamTrainingModel();
  if (!model.length) { return '<div class="empty">No team members found in your organization or reporting chain.</div>'; }
  model.sort(function(a, b){ return a.pct - b.pct; });
  var avgPct = model.length ? Math.round(model.reduce(function(sum, m){ return sum + m.pct; }, 0) / model.length) : 100;
  var html = '<div class="stats-row"><div class="stat-mini">Team Members <div class="n">' + model.length + '</div></div><div class="stat-mini">Avg Compliance <div class="n">' + avgPct + '%</div></div><div class="stat-mini">At Risk <div class="n">' + model.filter(function(m){ return m.pct < 80; }).length + '</div></div></div>';
  html += '<div class="team-grid">';
  model.forEach(function(m){
    var riskClass = m.pct >= 90 ? 'ok' : (m.pct >= 70 ? 'warn' : 'danger');
    html += '<div class="team-card"><div class="name">' + escHtml(formatPerson(m.person)) + '</div><div class="role">' + escHtml((m.person.OrgID && m.person.OrgID.Title) || '') + ' • ' + escHtml((m.person.PositionID && m.person.PositionID.Title) || '') + '</div><div class="training-bar" style="margin-top:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="badge ' + riskClass + '">' + m.pct + '% Compliant</span><span class="mini muted">' + m.current + '/' + m.total + '</span></div><div class="progress"><span style="width:' + m.pct + '%"></span></div></div><div class="mini muted" style="margin-top:6px">' + (m.expired ? '<span class="badge danger">Expired: ' + m.expired + '</span> ' : '') + (m.missing ? '<span class="badge warn">Missing: ' + m.missing + '</span>' : '') + (!m.expired && !m.missing ? '<span class="badge ok">All Current</span>' : '') + '</div><div style="margin-top:8px"><button class="btn subtle" data-action="view-person" data-id="' + escAttr(m.person.Id) + '">View</button></div></div>';

/* ─── People Supervisor Chain ─── */
function getSupervisorChain(personId){
  var people = APP.state.data.people || [];
  var chain = [];
  var visited = {};
  var currentId = personId;
  while (currentId && !visited[currentId] && chain.length < 10) {
    visited[currentId] = true;
    var person = null;
    people.some(function(p){ if (String(p.Id) === String(currentId)) { person = p; return true; } return false; });
    if (!person) { break; }
    if (String(person.Id) !== String(personId)) { chain.push(person); }
    currentId = person.SupervisorID && person.SupervisorID.Id ? person.SupervisorID.Id : null;
  }
  return chain;
}
function renderSupervisorChain(personId){
  var chain = getSupervisorChain(personId);
  if (!chain.length) { return '<div class="small-note">No supervisor chain found.</div>'; }
  var html = '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  chain.forEach(function(p, i){
    if (i > 0) { html += '<span class="muted">→</span>'; }
    html += '<span class="badge info" style="cursor:pointer" data-action="view-person" data-id="' + escAttr(p.Id) + '">' + escHtml(formatPerson(p)) + '</span>';
  });
  html += '</div>';
  return html;
}

function detectEmbeddedMode(){

  if (isEmbedded) {
    document.body.classList.add('embedded');
  } else {
    document.body.classList.remove('embedded');

  APP.state.embedded = isEmbedded;
}
function popoutFullscreen(){
  var url = window.location.href.split('?')[0].split('#')[0];

  window.open(url + '?fullscreen=1' + hash, '_blank');
}
