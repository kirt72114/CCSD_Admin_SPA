<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CCSD All-Things Administrative SPA</title>
<style>
:root{
  --bg:#07111f;
  --bg2:#0b1b31;
  --panel:rgba(10,21,39,.78);
  --panel-2:rgba(15,28,50,.88);
  --line:rgba(255,255,255,.09);
  --text:#eef5ff;
  --muted:#a7b7d6;
  --accent:#65d5ff;
  --accent-2:#8c7bff;
  --accent-3:#25f4c7;
  --danger:#ff6f8e;
  --warn:#ffc769;
  --ok:#6df0b6;
  --shadow:0 24px 60px rgba(0,0,0,.38);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);font-family:Segoe UI,Arial,sans-serif;height:100%;overflow:hidden}
a{color:var(--accent);text-decoration:none}
button,input,select,textarea{font:inherit}
body:before,body:after{content:'';position:fixed;pointer-events:none;z-index:0;border-radius:999px;filter:blur(50px);opacity:.24}
body:before{width:360px;height:360px;left:-80px;top:-40px;background:linear-gradient(135deg,var(--accent) 0%,transparent 75%);animation:floatBlob1 12s ease-in-out infinite}
body:after{width:420px;height:420px;right:-120px;top:120px;background:linear-gradient(135deg,var(--accent-2) 0%,transparent 75%);animation:floatBlob2 16s ease-in-out infinite}
@keyframes floatBlob1{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(20px,35px,0)}}
@keyframes floatBlob2{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(-20px,-25px,0)}}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;padding:8px 12px 0}
.hero{flex-shrink:0;z-index:20;background:linear-gradient(180deg,rgba(7,17,31,.96) 0%,rgba(7,17,31,.82) 100%);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:18px;padding:12px 16px 8px;box-shadow:var(--shadow)}
.hero-top{display:flex;gap:16px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
.brand-wrap{display:flex;gap:14px;align-items:center}
.brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),var(--accent),var(--accent-3));box-shadow:0 0 0 1px rgba(255,255,255,.14),0 14px 32px rgba(101,213,255,.28);position:relative;overflow:hidden}
.brand-mark:after{content:'';position:absolute;inset:1px;border-radius:11px;background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,.02))}
.brand-title{font-size:18px;font-weight:700;letter-spacing:.2px}
.brand-sub{margin-top:2px;color:var(--muted);font-size:11px;max-width:500px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 14px;cursor:pointer;transition:.2s transform,.2s border-color,.2s box-shadow}
.btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.2);box-shadow:0 10px 24px rgba(0,0,0,.22)}
.btn.primary{background:linear-gradient(135deg,var(--accent-2),var(--accent));border-color:transparent;color:#06101f;font-weight:700}
.btn.success{background:linear-gradient(135deg,#31d8a5,#7bf0c4);border-color:transparent;color:#062117;font-weight:700}
.btn.warn{background:linear-gradient(135deg,#ffb35f,#ffd88b);border-color:transparent;color:#2c1800;font-weight:700}
.btn.danger{background:linear-gradient(135deg,#ff7f92,#ff5481);border-color:transparent;color:#29050f;font-weight:700}
.btn.subtle{padding:8px 12px}
.user-pill,.status-pill,.role-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:12px;white-space:nowrap}
.user-pill .dot,.status-pill .dot,.role-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-3);box-shadow:0 0 0 6px rgba(37,244,199,.09)}
.nav-tabs{display:flex;gap:6px;overflow:auto;padding:8px 0 2px}
.nav-link{padding:7px 11px;border-radius:10px;font-size:13px;border:1px solid transparent;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;white-space:nowrap;transition:.18s all}
.nav-link.active,.nav-link:hover{color:var(--text);border-color:var(--line);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 25px rgba(0,0,0,.18)}
.context-bar{flex-shrink:0;margin:6px 0 4px;display:flex;gap:6px;flex-wrap:nowrap;align-items:center;overflow-x:auto;padding:4px 2px;font-size:11px}
.context-bar .spacer{flex:1}
.grid{display:grid;gap:16px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card.glow{position:relative}
.card.glow:before{content:'';position:absolute;inset:-1px;background:linear-gradient(135deg,rgba(101,213,255,.22),rgba(140,123,255,.16),rgba(37,244,199,.14));pointer-events:none;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);padding:1px;-webkit-mask-composite:xor;mask-composite:exclude;border-radius:var(--radius)}
.card-head{padding:16px 18px 10px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.card-title{font-size:16px;font-weight:700}
.card-sub{font-size:12px;color:var(--muted);margin-top:4px}
.card-body{padding:16px 18px}
.metric{display:flex;align-items:center;justify-content:space-between;gap:16px}
.metric .big{font-size:34px;font-weight:800;letter-spacing:.5px}
.metric .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}
.metric .spark{min-width:120px;height:12px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.metric .spark > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent-2),var(--accent),var(--accent-3))}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap}
.table-wrap{overflow:auto;border:1px solid rgba(255,255,255,.06);border-radius:14px;max-height:54vh}
th[data-sort]{cursor:pointer;user-select:none}
th[data-sort]:hover{color:var(--accent)}
th[data-sort].sort-asc:after{content:' ▲';font-size:9px}
th[data-sort].sort-desc:after{content:' ▼';font-size:9px}
table{width:100%;border-collapse:collapse;min-width:860px}
th,td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;vertical-align:top}
th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:rgba(255,255,255,.03);position:sticky;top:0}
tr:hover td{background:rgba(255,255,255,.03)}
.muted{color:var(--muted)}
.mini{font-size:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.07)}
.badge.ok{background:rgba(109,240,182,.12);color:#bcffde;border-color:rgba(109,240,182,.18)}
.badge.warn{background:rgba(255,199,105,.12);color:#ffe0a6;border-color:rgba(255,199,105,.18)}
.badge.danger{background:rgba(255,111,142,.12);color:#ffc2d0;border-color:rgba(255,111,142,.18)}
.badge.info{background:rgba(101,213,255,.12);color:#c4f1ff;border-color:rgba(101,213,255,.18)}
.badge.dim{background:rgba(255,255,255,.05);color:#d7e3f7;border-color:rgba(255,255,255,.08)}
.kv{display:grid;grid-template-columns:180px 1fr;gap:8px 14px}
.kv .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.kv .v{min-height:20px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.input,.select,.textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:var(--text);border-radius:12px;padding:11px 12px;outline:none}
.input:focus,.select:focus,.textarea:focus{border-color:rgba(101,213,255,.45);box-shadow:0 0 0 4px rgba(101,213,255,.10)}
.textarea{min-height:120px;resize:vertical}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.form-grid .full{grid-column:1 / -1}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.tile{padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));cursor:pointer;transition:.2s transform,.2s border-color}
.tile:hover{transform:translateY(-2px);border-color:rgba(101,213,255,.28)}
.tile-title{font-weight:700;font-size:15px}
.tile-sub{font-size:12px;color:var(--muted);margin-top:6px}
.progress{height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent),var(--accent-3));border-radius:999px}
.empty{padding:28px;border:1px dashed rgba(255,255,255,.12);border-radius:16px;color:var(--muted);text-align:center}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.section-title{font-size:18px;font-weight:800}
.loading{padding:40px;text-align:center;color:var(--muted)}
.loading .orb{display:inline-block;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 0 10px rgba(101,213,255,.09);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.modal-mask{position:fixed;inset:0;background:rgba(2,8,18,.72);display:none;align-items:center;justify-content:center;padding:24px;z-index:60;backdrop-filter:blur(10px)}
.modal{width:min(960px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#0d1a31,#081120);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.modal-head,.modal-foot{padding:18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-foot{border-top:1px solid rgba(255,255,255,.06);border-bottom:0}
.modal-body{padding:18px}
.close-x{font-size:22px;line-height:1;cursor:pointer;color:var(--muted);padding:6px 10px;border-radius:12px}
.close-x:hover{background:rgba(255,255,255,.06);color:var(--text)}
.toast-host{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:10px;max-width:360px}
.toast{padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg,rgba(10,21,39,.96),rgba(15,28,50,.96));box-shadow:var(--shadow)}
.toast.ok{border-color:rgba(109,240,182,.28)}
.toast.warn{border-color:rgba(255,199,105,.28)}
.toast.danger{border-color:rgba(255,111,142,.28)}
.list-inline{display:flex;gap:8px;flex-wrap:wrap}
.health-row{display:grid;grid-template-columns:180px 1fr auto;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.health-row:last-child{border-bottom:0}
.small-note{font-size:11px;color:var(--muted)}
@media (max-width:1100px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.kv{grid-template-columns:1fr}}
@media (max-height:600px){.hero{padding:8px 12px 4px}.nav-tabs{padding:4px 0 0}.brand-sub{display:none}.context-bar{margin:2px 0}}

.asset-hero{display:grid;grid-template-columns:1.35fr .95fr;gap:16px;align-items:start}
.asset-person-card{border:1px solid #d7e0ea;border-radius:18px;background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);padding:16px 18px;box-shadow:0 6px 20px rgba(19,52,89,.07)}
.asset-person-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.asset-person-name{font-size:22px;font-weight:800;color:#102642;line-height:1.2}
.asset-person-sub{font-size:13px;color:#55697f;margin-top:4px}
.asset-quickstats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}
.asset-stat{border:1px solid #d8e1eb;border-radius:14px;background:#fff;padding:10px 12px}
.asset-stat .n{font-size:20px;font-weight:800;color:#0f2f52}
.asset-stat .t{font-size:12px;color:#5d6f82;margin-top:3px}
.asset-env-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:14px}
.asset-env{border:1px solid #d6e0ea;border-radius:16px;background:#ffffff;padding:12px 14px}
.asset-env-title{font-weight:800;color:#12314e;margin-bottom:10px;font-size:14px}
.asset-assignment{border:1px solid #dbe4ee;border-radius:14px;background:#fbfdff;padding:12px 12px;margin-bottom:10px}
.asset-assignment-title{font-weight:800;color:#14304c}
.asset-assignment-sub{font-size:12px;color:#5c6e82;margin-top:3px}
.asset-assignment-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.asset-meta-pill{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#edf3fa;border:1px solid #d6e1ec;color:#11304d;font-size:11px;font-weight:700}
.asset-section-title{font-weight:800;color:#12324f;margin-bottom:10px;font-size:14px}
.asset-empty{padding:12px 0;color:#6a7d92;font-size:13px}
.asset-table-title{font-weight:800;color:#12314f;font-size:16px}
.asset-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.asset-focus-strip{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 14px;border:1px solid #d5e0ea;border-radius:16px;background:#f8fbff;margin-bottom:16px}
.asset-mini-note{font-size:12px;color:#5e7288}
.asset-risk-good{color:#0a6c35;font-weight:800}
.asset-risk-warn{color:#996300;font-weight:800}
.asset-risk-bad{color:#a22222;font-weight:800}
.asset-soft-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.asset-slim-card{border:1px solid #d8e1eb;border-radius:16px;padding:12px 14px;background:#fff}
.asset-slim-card .hd{font-size:13px;color:#5c7085;font-weight:700}
.asset-slim-card .val{font-size:22px;color:#10304f;font-weight:800;margin-top:4px}

/* ─── No-Scroll SPA: viewHost fills remaining height ─── */
#viewHost{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding:0 2px 12px}
#viewHost::-webkit-scrollbar{width:6px}
#viewHost::-webkit-scrollbar-track{background:transparent}
#viewHost::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px}
#viewHost::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}

/* ─── Smooth Page Transitions ─── */
#viewHost > *{animation:fadeSlideIn .22s ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-mask[style*="flex"]{animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast{animation:toastSlide .3s ease-out}
@keyframes toastSlide{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ─── Card hover lift ─── */
.card{transition:.22s transform,.22s box-shadow}
.card:hover{transform:translateY(-1px)}

/* ─── Focus styles for accessibility ─── */
.btn:focus-visible,.nav-link:focus-visible,.tile:focus-visible,.input:focus-visible,.select:focus-visible,.textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.close-x:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

/* ─── Comment Thread ─── */
.comment-thread{display:flex;flex-direction:column;gap:10px;max-height:240px;overflow-y:auto;padding:4px 0}
.comment-item{padding:10px 12px;border:1px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.03)}
.comment-item .comment-meta{font-size:11px;color:var(--muted);margin-bottom:4px}
.comment-item .comment-text{font-size:13px}
.comment-form{display:flex;gap:8px;margin-top:8px}
.comment-form .input{flex:1}

/* ─── Supervisor / Team View ─── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.team-card{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.04)}
.team-card .name{font-weight:700;font-size:15px}
.team-card .role{font-size:12px;color:var(--muted);margin-top:2px}
.team-card .training-bar{margin-top:10px}

/* ─── Stats Row ─── */
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat-mini{padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:700}
.stat-mini .n{font-size:16px;font-weight:800}

/* ─── Print Styles ─── */
@media print{
  body:before,body:after{display:none!important}
  .hero,.toast-host,.modal-mask,.context-bar,.quick-actions,.btn,.nav-tabs,.header-actions,.filter-row{display:none!important}
  #app{padding:0!important}
  .card,.tile{break-inside:avoid;box-shadow:none!important;border:1px solid #ccc!important}
  .card:hover{transform:none!important}
  body,html{background:#fff!important;color:#000!important}
  .table-wrap{overflow:visible!important}
  table{min-width:0!important}
  *{color:#000!important;background:transparent!important;border-color:#ccc!important}
  .badge{border:1px solid #999!important}
  .progress > span{background:#333!important}
}

/* ─── Notification badge ─── */
.notif-badge{position:relative}
.notif-badge:after{content:attr(data-count);position:absolute;top:-4px;right:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ─── Seat map styles ─── */
.seat-map-wrap{position:relative;border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden}
.seat-map-wrap svg text{user-select:none}

/* ─── Floor Plan Viewer ─── */
.floorplan-wrapper{display:flex;gap:12px;align-items:stretch}
.floorplan-main{flex:1;min-width:0}
.floorplan-sidebar{width:240px;flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;max-height:70vh;overflow:hidden}
.floorplan-sidebar .sb-head{padding:10px 12px 8px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:6px}
.floorplan-sidebar .sb-search{width:100%;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);font-size:11px;margin-top:6px}
.floorplan-sidebar .sb-list{flex:1;overflow-y:auto;padding:4px}
.floorplan-sidebar .sb-item{padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;transition:.15s background;display:flex;align-items:center;gap:8px;border:1px solid transparent}
.floorplan-sidebar .sb-item:hover,.floorplan-sidebar .sb-item.highlight{background:rgba(101,213,255,.1);border-color:rgba(101,213,255,.2)}
.floorplan-sidebar .sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.floorplan-sidebar .sb-dot.occupied{background:#17794f}
.floorplan-sidebar .sb-dot.available{background:#1f7ae0}
.floorplan-sidebar .sb-dot.maintenance{background:#a06b04}
.floorplan-sidebar .sb-dot.unplaced{background:var(--muted);opacity:.4}
.floorplan-sidebar .sb-info{flex:1;min-width:0}
.floorplan-sidebar .sb-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.floorplan-sidebar .sb-sub{color:var(--muted);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.floorplan-sidebar .sb-actions{display:flex;gap:2px;opacity:0;transition:.15s opacity}
.floorplan-sidebar .sb-item:hover .sb-actions{opacity:1}
.floorplan-sidebar .sb-actions button{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.floorplan-sidebar .sb-actions button:hover{background:rgba(101,213,255,.2)}
.floorplan-sidebar .sb-count{padding:6px 12px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);text-align:center}

.org-above-path{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.org-above-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:#eef5ff;border:1px solid #d6e2ef;color:#163b60;font-size:12px;font-weight:800}
.org-above-arrow{color:#7b8ea1;font-weight:900}
.org-root-hero{position:relative;padding:22px 24px;border-radius:26px;border:1px solid #cddbeb;background:linear-gradient(135deg,#ffffff 0%,#f3f8ff 54%,#fff8ea 100%);box-shadow:0 18px 40px rgba(15,36,61,.08);overflow:hidden}
.org-root-hero:after{content:'';position:absolute;right:-40px;top:-36px;width:220px;height:220px;background:radial-gradient(circle at center,rgba(15,90,184,.12) 0%,rgba(15,90,184,.05) 36%,rgba(255,194,32,.06) 58%,rgba(255,255,255,0) 72%);pointer-events:none}
.org-root-hero-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;position:relative;z-index:1}
.org-root-kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#4a647d;font-weight:900}
.org-root-title{font-size:36px;font-weight:900;line-height:1.02;color:#08243f;margin-top:6px}
.org-root-sub{margin-top:8px;color:#536a80;max-width:1080px}
.org-root-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;position:relative;z-index:1}
.org-root-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:18px;position:relative;z-index:1}
.org-root-metric{padding:12px 14px;border-radius:16px;background:#fff;border:1px solid #d7e2ed;box-shadow:0 8px 16px rgba(15,36,61,.04)}
.org-root-metric .n{font-size:24px;font-weight:800;color:#08243f}
.org-root-metric .t{font-size:11px;color:#536a80;text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-top:4px}
.org-layout-note{margin-top:12px;font-size:12px;color:#5a7085;padding:10px 12px;border-radius:12px;background:#f8fbff;border:1px dashed #cfdae6;position:relative;z-index:1}

.org-hq-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;align-items:start}
.org-band{border:1px solid #d7e2ed;border-radius:22px;background:linear-gradient(180deg,#ffffff,#f8fbff);box-shadow:0 14px 30px rgba(15,36,61,.05);overflow:hidden}
.org-band.groups{grid-column:1 / -1}
.org-band-head{padding:16px 18px;border-bottom:1px solid #dde7f1;background:linear-gradient(90deg,#f8fbff,#fff9ed)}
.org-band-title{font-size:14px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#173a5d}
.org-band-sub{margin-top:5px;font-size:12px;color:#61788d}
.org-band-body{padding:14px}
.org-summary-grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
.org-band.groups .org-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
.org-summary-card{position:relative;padding:16px;border-radius:18px;border:1px solid #d6e2ef;background:#fff;box-shadow:0 8px 18px rgba(15,36,61,.04);overflow:hidden}
.org-summary-card:before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,#0f5ab8,#1f7ae0)}
.org-summary-card.functional:before{background:linear-gradient(180deg,#38598b,#5a7fb7)}
.org-summary-card.group:before{background:linear-gradient(180deg,#0f4e9c,#e0a400)}
.org-summary-card.selected{border-color:#0f5ab8;box-shadow:0 14px 28px rgba(15,90,184,.15), inset 0 0 0 1px rgba(15,90,184,.08);background:linear-gradient(180deg,#ffffff,#eef6ff)}
.org-summary-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.org-summary-name{font-size:20px;font-weight:900;color:#08243f;line-height:1.08;padding-left:4px}
.org-summary-meta{margin-top:5px;font-size:12px;color:#60768b;padding-left:4px}
.org-summary-code{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#eff5fb;border:1px solid #d7e2ef;color:#20486b;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.org-summary-quick{margin-top:14px;padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,#fbfdff,#f4f8fd);border:1px solid #dbe6f0}
.org-summary-quick .label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#5d7488;font-weight:900}
.org-summary-quick .value{margin-top:4px;font-size:14px;color:#0d2f50;font-weight:800;line-height:1.25}
.org-summary-quick .sub{margin-top:4px;font-size:12px;color:#61788d}
.org-summary-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
.org-summary-metric{padding:9px 10px;border-radius:12px;background:#f6faff;border:1px solid #dbe6f0;text-align:center}
.org-summary-metric .n{font-size:18px;font-weight:800;color:#0a2948}
.org-summary-metric .t{margin-top:3px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#5f768b;font-weight:800}
.org-summary-children{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.org-mini-chip{display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;border:1px solid #d8e3ee;background:#f6faff;color:#173a5d;font-size:11px;font-weight:700}
.org-summary-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.org-summary-empty{padding:20px;border:1px dashed #d0dceb;border-radius:16px;background:#fbfdff;color:#5b7085;text-align:center}

.org-detail-hero{padding:18px;border-radius:18px;border:1px solid #d7e1ec;background:linear-gradient(135deg,#ffffff 0%,#f4f9ff 62%,#fff9ea 100%);box-shadow:0 12px 28px rgba(15,36,61,.06)}
.org-detail-title{font-size:28px;font-weight:800;color:#08243f;line-height:1.1}
.org-detail-sub{margin-top:8px;color:#52687e}
.org-breadcrumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.org-crumb{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid #d6e2ee;color:#173a5d;font-size:12px;font-weight:700}
.org-kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}
.org-kpi{padding:12px 14px;border-radius:16px;background:#fff;border:1px solid #d8e3ee}
.org-kpi .n{font-size:24px;font-weight:800;color:#09284a}
.org-kpi .t{font-size:12px;color:#556d83;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:4px}
.org-section{margin-top:16px}
.org-section .section-headline{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#486178;font-weight:800;margin-bottom:10px}
.org-suborg-list,.org-people-list,.org-position-list,.org-leadership-list{display:flex;flex-direction:column;gap:10px}
.org-inline-card,.org-leadership-card{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:14px;border:1px solid #d8e2ed;background:#fff}
.org-inline-card .title,.org-leadership-card .title{font-weight:800;color:#0b2845}
.org-inline-card .sub,.org-leadership-card .sub{font-size:12px;color:#5d7287;margin-top:4px}
.org-count-note{font-size:12px;color:#5d7287;margin-top:10px}
.org-branch-shell{display:grid;grid-template-columns:minmax(580px,1.12fr) minmax(420px,.88fr);gap:16px}
.org-branch-panel .card-sub{max-width:900px}
.org-band-note{margin-top:10px;font-size:12px;color:#5e7488}

@media (max-width:1540px){
  .org-band.groups .org-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width:1440px){
  .org-hq-layout{grid-template-columns:1fr}
  .org-band.groups{grid-column:auto}
}
@media (max-width:1320px){
  .org-branch-shell{grid-template-columns:1fr}
  .org-root-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:980px){
  .org-summary-grid,.org-band.groups .org-summary-grid,.org-kpis,.org-root-metrics{grid-template-columns:1fr}
  .org-card-top,.org-inline-card,.org-summary-top,.org-root-hero-top,.org-leadership-card{flex-direction:column}
  .org-root-title{font-size:30px}
  .org-chart-toolbar .input{min-width:220px;width:100%}
}

/* ─── Calendar Module ─── */
.cal-header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.cal-header-left{display:flex;align-items:center;gap:8px}
.cal-header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cal-title{font-size:20px;font-weight:800}
.cal-nav-btn{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{background:rgba(101,213,255,.12);border-color:rgba(101,213,255,.2)}
.cal-view-toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cal-view-toggle button{padding:6px 12px;border:none;background:rgba(255,255,255,.04);color:var(--muted);font-size:11px;cursor:pointer;font-weight:600}
.cal-view-toggle button.active{background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#06101f}
.cal-scope-select{padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:11px}
.cal-legend{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--line);margin-bottom:8px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.cal-legend-swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0}

/* Month View */
.cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-month-head{background:rgba(255,255,255,.06);padding:6px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}
.cal-day{background:var(--panel);min-height:90px;padding:4px;display:flex;flex-direction:column;position:relative;transition:.12s background}
.cal-day:hover{background:rgba(255,255,255,.04)}
.cal-day.outside{opacity:.35}
.cal-day.today{background:rgba(101,213,255,.06);box-shadow:inset 0 2px 0 var(--accent)}
.cal-day.weekend{background:rgba(255,255,255,.015)}
.cal-day-num{font-size:11px;font-weight:700;padding:2px 4px;line-height:1;color:var(--muted)}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:800}
.cal-day-entries{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;margin-top:2px}
.cal-entry{padding:2px 5px;border-radius:4px;font-size:9px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-left:3px solid transparent}
.cal-entry:hover{filter:brightness(1.2)}
.cal-entry.leave{background:rgba(109,240,182,.12);color:#6df0b6;border-left-color:#6df0b6}
.cal-entry.tdy{background:rgba(255,199,105,.12);color:#ffc769;border-left-color:#ffc769}
.cal-entry.training{background:rgba(140,123,255,.12);color:#8c7bff;border-left-color:#8c7bff}
.cal-entry.comp{background:rgba(101,213,255,.12);color:#65d5ff;border-left-color:#65d5ff}
.cal-entry.telework{background:rgba(37,244,199,.12);color:#25f4c7;border-left-color:#25f4c7}
.cal-entry.holiday{background:rgba(255,111,142,.08);color:#ff6f8e;border-left-color:#ff6f8e}
.cal-entry.other{background:rgba(167,183,214,.1);color:var(--muted);border-left-color:var(--muted)}
.cal-entry.sick{background:rgba(255,84,129,.12);color:#ff5481;border-left-color:#ff5481}
.cal-holiday-label{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(255,111,142,.1);color:#ff6f8e;font-weight:700;display:block;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Week View */
.cal-week{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line)}
.cal-week-head{background:rgba(255,255,255,.06);padding:8px 6px;text-align:center}
.cal-week-head .day-name{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}
.cal-week-head .day-num{font-size:18px;font-weight:800;margin-top:2px}
.cal-week-head.today{background:rgba(101,213,255,.08)}
.cal-week-head.today .day-num{color:var(--accent)}
.cal-week-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);min-height:300px}
.cal-week-col{background:var(--panel);padding:6px 4px;display:flex;flex-direction:column;gap:4px}
.cal-week-col.today{background:rgba(101,213,255,.04)}
.cal-week-entry{padding:6px 8px;border-radius:6px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;gap:2px}
.cal-week-entry .entry-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-week-entry .entry-type{font-size:9px;opacity:.7}

/* List View */
.cal-list{display:flex;flex-direction:column;gap:2px}
.cal-list-day{padding:8px 0 4px;font-size:11px;font-weight:800;color:var(--muted);border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.06em}
.cal-list-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.12s background}
.cal-list-item:hover{background:rgba(255,255,255,.04)}
.cal-list-item .swatch{width:6px;height:28px;border-radius:3px;flex-shrink:0}
.cal-list-item .info{flex:1;min-width:0}
.cal-list-item .info .name{font-weight:700;font-size:13px}
.cal-list-item .info .meta{font-size:11px;color:var(--muted)}
.cal-list-item .type-badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}

/* Senior Leaders */
.cal-leaders{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:12px}
.cal-leader-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.cal-leader-card .ldr-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cal-leader-card .ldr-name{font-weight:800;font-size:13px}
.cal-leader-card .ldr-role{font-size:10px;color:var(--muted)}
.cal-leader-card .ldr-status{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.cal-leader-card .ldr-entries{display:flex;flex-direction:column;gap:3px}
.cal-leader-card .ldr-entry{font-size:11px;padding:4px 8px;border-radius:6px;display:flex;justify-content:space-between;gap:6px}
.cal-leader-card .ldr-entry .dates{font-size:10px;color:var(--muted)}

/* ─── Embedded / Fullscreen Dual-Mode ─── */
.embedded #app{padding:4px 6px 0}
.embedded .hero{padding:6px 10px 4px;border-radius:10px}
.embedded .brand-mark{width:24px;height:24px;border-radius:8px}
.embedded .brand-title{font-size:14px}
.embedded .brand-sub{display:none}
.embedded .nav-link{padding:5px 8px;font-size:11px;border-radius:8px}
.embedded .nav-tabs{padding:4px 0 1px;gap:4px}
.embedded .context-bar{margin:3px 0 2px;font-size:10px;gap:4px}
.embedded .user-pill{padding:4px 8px;font-size:10px}
.embedded .header-actions .btn{padding:6px 10px;font-size:11px;border-radius:8px}
.embedded .card{padding:14px 16px;border-radius:12px}
.embedded .card-title{font-size:15px}
.embedded .modal .modal{max-width:90vw;max-height:85vh}
.btn-popout{background:linear-gradient(135deg,var(--accent-3),var(--accent));border:none;color:#06101f;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;display:none;align-items:center;gap:4px;transition:.2s transform}
.btn-popout:hover{transform:translateY(-1px)}
.embedded .btn-popout{display:inline-flex}
.fullscreen-badge{display:none;font-size:9px;color:var(--accent-3);padding:2px 6px;border:1px solid rgba(37,244,199,.2);border-radius:6px;background:rgba(37,244,199,.06);margin-left:6px}
body:not(.embedded) .fullscreen-badge{display:inline-block}

/* ─── Person Detail Page ─── */
.person-detail{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.person-detail .pd-section{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.person-detail .pd-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.person-detail .pd-full{grid-column:1/-1}

/* ─── Reporting Module ─── */
.report-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.report-chart{display:flex;gap:2px;align-items:flex-end;height:120px;padding:8px 0}
.report-bar{flex:1;min-width:18px;background:linear-gradient(180deg,var(--accent),var(--accent-2));border-radius:4px 4px 0 0;position:relative;transition:.3s height}
.report-bar:hover{opacity:.8}
.report-bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--muted);white-space:nowrap}
.report-bar-value{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--text);white-space:nowrap}

/* ─── Theme Toggle ─── */
body.light-theme{--bg:#f0f2f5;--bg2:#e4e8ee;--panel:rgba(255,255,255,.92);--panel-2:rgba(255,255,255,.96);--line:rgba(0,0,0,.10);--text:#1a1a2e;--muted:#5a6478;--shadow:0 24px 60px rgba(0,0,0,.10)}
body.light-theme:before,body.light-theme:after{opacity:.10}
body.light-theme .hero{background:linear-gradient(180deg,rgba(240,242,245,.98),rgba(240,242,245,.92))}
body.light-theme .btn{background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.08));color:var(--text)}
body.light-theme .nav-link{color:var(--muted)}
body.light-theme .nav-link.active{color:var(--text);border-bottom-color:var(--accent-2)}
body.light-theme .card,.light-theme .dash-card{background:var(--panel);border-color:var(--line)}
body.light-theme .tile{background:rgba(0,0,0,.03);border-color:var(--line)}
body.light-theme .input,body.light-theme .select,body.light-theme .textarea{background:rgba(0,0,0,.04);border-color:var(--line);color:var(--text)}
body.light-theme .modal{background:var(--panel-2);border-color:var(--line)}
body.light-theme .modal-mask{background:rgba(0,0,0,.3)}
body.light-theme .toast{background:var(--panel-2);color:var(--text);border-color:var(--line)}
body.light-theme .seat-marker{border-color:rgba(0,0,0,.4)}
body.light-theme .seat-tooltip{background:var(--panel-2);color:var(--text);border-color:var(--line)}
body.light-theme .kv .k{color:var(--muted)}
body.light-theme .dash-welcome{background:linear-gradient(135deg,rgba(101,213,255,.08),rgba(140,123,255,.08))}
body.light-theme .dash-kpi{background:var(--panel)}
body.light-theme .dash-nav-tile{background:rgba(0,0,0,.04)}
body.light-theme .dash-nav-tile:hover{background:rgba(0,0,0,.08)}

/* ─── Loading Skeletons ─── */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
body.light-theme .skeleton{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-text{height:12px;margin:6px 0;width:80%}
.skeleton-title{height:18px;margin:8px 0;width:60%}
.skeleton-card{height:100px;margin:10px 0}
.skeleton-row{height:36px;margin:4px 0;border-radius:6px}

/* ─── Breadcrumbs ─── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:4px 0}
.breadcrumb a{color:var(--accent);cursor:pointer}
.breadcrumb .sep{opacity:.4}

/* ─── Undo Toast ─── */
.toast .undo-btn{margin-left:10px;padding:2px 8px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;color:var(--accent);cursor:pointer;font-size:11px}
.toast .undo-btn:hover{background:rgba(255,255,255,.1)}

/* ─── Print Styles ─── */
@media print{
  body,html{background:#fff!important;color:#000!important;overflow:visible!important;height:auto!important}
  body:before,body:after,.hero,.modal-mask,.toast-host,.btn-popout,.fullscreen-badge{display:none!important}

function ensureListSchema(listTitle){

function resolveFieldObject(schema, name){
  var i;
  var found;
  if (!schema || !name) { return null; }
  if (Object.prototype.toString.call(name) === '[object Array]') {
    for (i = 0; i < name.length; i++) {
      found = resolveFieldObject(schema, name[i]);
      if (found) { return found; }
    }

  }
  return schema.byInternal[name] || schema.byTitle[name] || schema.byNorm[normKey(name)] || null;
}
function resolveFieldName(listTitle, preferred, aliases){

    var all = [preferred].concat(aliases || []);
    var found = null;

function buildSelectExpand(listTitle, wanted){
  return ensureListSchema(listTitle).then(function(schema){
    var select = ['Id'];
    var expand = [];
    var expandMap = {};
    function addExpand(name){
      if (!expandMap[name]) {
        expandMap[name] = true;
        expand.push(name);
      }
    }
    wanted.forEach(function(item){
      var parts = String(item).split('/');
      var root = parts[0];
      var field = resolveFieldObject(schema, root);
      var type = field ? field.TypeAsString : '';
      if (!field) { return; }
      if (parts.length === 1) {
        if (type === 'Lookup' || type === 'LookupMulti') {
          select.push(field.InternalName + '/Id');
          select.push(field.InternalName + '/Title');
          addExpand(field.InternalName);
        } else if (type === 'User' || type === 'UserMulti') {
          select.push(field.InternalName + '/Id');
          select.push(field.InternalName + '/Title');
          select.push(field.InternalName + '/EMail');
          addExpand(field.InternalName);
        } else {
          select.push(field.InternalName);
        }
      } else {
        if (type === 'Lookup' || type === 'User' || type === 'LookupMulti' || type === 'UserMulti') {
          select.push(field.InternalName + '/' + parts[1]);
          addExpand(field.InternalName);
        }
      }
    });
    return { select: unique(select), expand: expand };
  });
}
function queryList(listTitle, wanted, opts, context){
  opts = opts || {};
  function run(currentWanted, attempt){
    return buildSelectExpand(listTitle, currentWanted || []).then(function(sel){
      var parts = [];
      if (sel.select.length) { parts.push('$select=' + encodeURIComponent(sel.select.join(','))); }
      if (sel.expand.length) { parts.push('$expand=' + encodeURIComponent(sel.expand.join(','))); }
      if (opts.filter) { parts.push('$filter=' + encodeURIComponent(opts.filter)); }
      if (opts.orderby) { parts.push('$orderby=' + encodeURIComponent(opts.orderby)); }
      parts.push('$top=' + encodeURIComponent(String(opts.top || 200)));
      var path = "/web/lists/GetByTitle('" + escOData(listTitle) + "')/items?" + parts.join('&');
      return spGetJson(path, context || ('queryList:' + listTitle)).then(function(data){
        return data.value || [];
      }).catch(function(err){
        var msg = extractSpErrorMessage(err);
        var match = /The query to field '([^']+)' is not valid/i.exec(msg || '');
        if (attempt < 3 && match && match[1]) {
          var bad = normKey(match[1]);
          var trimmed = (currentWanted || []).filter(function(item){ return normKey(String(item).split('/')[0]) !== bad; });
          if (trimmed.length !== (currentWanted || []).length) {
            addDiagnostic('warn', context || ('queryList:' + listTitle), 'Removed invalid field from query and retried.', { listTitle: listTitle, field: match[1], originalWanted: currentWanted });
            return run(trimmed, attempt + 1);
          }
        }
        throw err;
      });
    });
  }
  return run(wanted || [], 0);
}
function buildWritePayload(listTitle, values){
  return ensureListSchema(listTitle).then(function(schema){
    var payload = {};
    Object.keys(values || {}).forEach(function(key){
      var field = resolveFieldObject(schema, key);
      var value = values[key];
      var internal;
      var type;
      var num;
      var lookupId;
      var urlObj;
      if (!field) {
        if (!suppressDuplicate('missing-write-field|' + listTitle + '|' + normKey(key), 30000)) {
          addDiagnostic('warn', 'buildWritePayload', 'Skipped write field not present in list schema.', { listTitle: listTitle, field: key, valuePreview: value == null ? '' : trimText(value, 250), valueType: getValueType(value) });
        }
        return;
      }
      if (field.Hidden || field.ReadOnlyField) { return; }
      internal = field.InternalName;
      type = field.TypeAsString || '';
      if (type === 'Lookup' || type === 'User') {
        lookupId = coerceLookupIdValue(value);
        if (lookupId == null) { return; }
        payload[internal + 'Id'] = lookupId;
      } else if (type === 'LookupMulti' || type === 'UserMulti') {
        payload[internal + 'Id'] = { results: toArraySafe(value).map(function(v){ return coerceLookupIdValue(v); }).filter(function(v){ return v != null; }) };
      } else if (type === 'MultiChoice') {
        payload[internal] = { results: toArraySafe(value).map(function(v){ return normalizeChoiceValue(v); }).filter(function(v){ return v !== ''; }) };
      } else if (type === 'Boolean') {
        payload[internal] = normalizeBoolean(value);
      } else if (type === 'Number' || type === 'Currency' || type === 'Integer' || type === 'Counter') {
        if (value == null || value === '') { return; }
        num = Number(value);
        if (isNaN(num)) {
          if (!suppressDuplicate('invalid-number-field|' + listTitle + '|' + normKey(key), 30000)) {
            addDiagnostic('warn', 'buildWritePayload', 'Skipped non-numeric value for numeric field.', { listTitle: listTitle, field: key, valuePreview: trimText(value, 250), valueType: getValueType(value) });
          }
          return;
        }
        payload[internal] = num;
      } else if (type === 'DateTime') {
        if (value == null || value === '') { return; }
        payload[internal] = value;
      } else if (type === 'URL') {
        urlObj = buildUrlFieldValue(value);
        if (!urlObj) { return; }
        payload[internal] = urlObj;
      } else {
        if (value == null) { payload[internal] = ''; }
        else if (typeof value === 'object') { payload[internal] = safeJson(value); }
        else { payload[internal] = value; }
      }
    });
    return payload;
  });
}

/* ─── Debounce ─── */
function debounce(fn, delay){
  var timer = null;
  return function(){
    var args = arguments;
    var ctx = this;
    clearTimeout(timer);
    timer = setTimeout(function(){ fn.apply(ctx, args); }, delay || 200);
  };
}

function validateRequired(value, label){
  if (value == null || String(value).trim() === '') { return label + ' is required.'; }

}
function validateEmail(value){
  if (!value) { return ''; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value).trim())) { return 'Invalid email format.'; }
  return '';
}
function validatePhone(value){
  if (!value) { return ''; }
  if (!/^[\d\s\-\(\)\+\.ext]+$/i.test(String(value).trim())) { return 'Invalid phone number format.'; }
  return '';
}
function validateDate(value, label){
  if (!value) { return ''; }

}
function validateMinLength(value, min, label){

/* ─── Retry with Exponential Backoff ─── */
function retryWithBackoff(fn, maxRetries, baseDelay){
  maxRetries = maxRetries || 3;
  baseDelay = baseDelay || 1000;
  function attempt(n){
    return fn().catch(function(err){
      if (n >= maxRetries) { throw err; }
      if (err && err.status && err.status < 500 && err.status !== 429) { throw err; }
      var delay = baseDelay * Math.pow(2, n);
      return new Promise(function(resolve){ setTimeout(resolve, delay); }).then(function(){ return attempt(n + 1); });
    });
  }
  return attempt(0);
}

/* ─── Environment & Site Resolution ─── */
function detectSiteConfig(){
  var hostname = (window.location.hostname || '').toLowerCase();
  var href = (window.location.href || '').toLowerCase();
  var pathname = (window.location.pathname || '').toLowerCase();

  /* 1. Try exact hostname match from APP.sites */
  if (APP.sites[hostname]) {
    return APP.sites[hostname];
  }

  /* 2. Try partial hostname match (subdomain-safe) */
  var siteKeys = Object.keys(APP.sites);
  for (var i = 0; i < siteKeys.length; i++) {
    if (hostname.indexOf(siteKeys[i]) >= 0) {
      return APP.sites[siteKeys[i]];
    }
  }

  /* 3. Derive from current URL — works when pasted into any SharePoint site */
  if (href.indexOf('sharepoint.com') >= 0 || href.indexOf('.dps.mil') >= 0) {
    var origin = window.location.origin || (window.location.protocol + '//' + window.location.host);
    var siteMatch = pathname.match(/^(\/sites\/[^\/]+|\/teams\/[^\/]+(?:\/[^\/]+)?)/i);
    var sitePath = siteMatch ? siteMatch[1] : '';
    return {
      rootUrl: origin + sitePath,
      label: 'Auto-detected (' + hostname + ')',
      environment: 'production'
    };
  }

  /* 4. Local / dev fallback */
  if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '') {
    return { rootUrl: '', label: 'Local Development', environment: 'development' };
  }

  /* 5. Test environment heuristic */
  if (href.indexOf('-test') >= 0 || href.indexOf('test.') >= 0 || href.indexOf('/test/') >= 0) {
    return { rootUrl: '', label: 'Test Environment', environment: 'test' };
  }

  /* 6. Unknown — leave rootUrl as-is (fallback to whatever was hardcoded) */
  return null;
}
function initializeSiteConfig(){
  var config = detectSiteConfig();
  if (config) {
    if (config.rootUrl) { APP.rootUrl = config.rootUrl; }
    APP.environment = config.environment || 'production';
    APP.siteLabel = config.label || '';
  } else {
    APP.environment = 'production';
    APP.siteLabel = 'Default Configuration';
    /* Keep whatever rootUrl was already set as fallback */
    if (!APP.rootUrl) {
      APP.rootUrl = 'https://usaf.dps.mil/teams/aetc-lak-cpsg/Database';
    }
  }
}
initializeSiteConfig();

/* ─── Export Utilities ─── */
function exportTableToCSV(tableSelector, filename){
  var table = document.querySelector(tableSelector);
  if (!table) { toast('No table found to export.', 'warn'); return; }
  var rows = table.querySelectorAll('tr');
  var csv = [];
  for (var i = 0; i < rows.length; i++) {
    var cells = rows[i].querySelectorAll('th, td');
    var row = [];
    for (var j = 0; j < cells.length; j++) {
      var text = String(cells[j].textContent || '').replace(/"/g, '""').replace(/\n/g, ' ').trim();
      row.push('"' + text + '"');
    }
    csv.push(row.join(','));
  }
  var blob = new Blob([csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + formatDate(new Date()) + '.csv';
  link.click();
  toast('Export complete.', 'ok');
}

/* ─── Data Quality Rules Engine ─── */
function runDataQualityChecks(){
  var issues = [];
  var people = APP.state.data.people || [];
  var orgs = APP.state.data.organizations || [];
  people.forEach(function(p){
    if (!p.Email && String(p.Status || '').toLowerCase() !== 'departed') {
      issues.push({ entity: 'Person', id: p.Id, name: formatPerson(p), rule: 'Missing Email', severity: 'warn' });
    }
    if (!p.OrgID || !p.OrgID.Id) {
      issues.push({ entity: 'Person', id: p.Id, name: formatPerson(p), rule: 'No Organization Assigned', severity: 'warn' });
    }
    if (!p.PositionID || !p.PositionID.Id) {
      issues.push({ entity: 'Person', id: p.Id, name: formatPerson(p), rule: 'No Position Assigned', severity: 'info' });
    }
    if (!p.SupervisorPersonID || !p.SupervisorPersonID.Id) {
      if (String(p.Status || '').toLowerCase() !== 'departed') {
        issues.push({ entity: 'Person', id: p.Id, name: formatPerson(p), rule: 'No Supervisor Linked', severity: 'info' });
      }
    }
    if (p.DateArrived && p.DateDeparted) {
      var arr = parseDate(p.DateArrived);
      var dep = parseDate(p.DateDeparted);
      if (arr && dep && dep.getTime() < arr.getTime()) {
        issues.push({ entity: 'Person', id: p.Id, name: formatPerson(p), rule: 'Departure before Arrival', severity: 'danger' });
      }
    }
  });
  orgs.forEach(function(o){
    if (!o.OrgCode && !o.OrgID) {
      issues.push({ entity: 'Organization', id: o.Id, name: getOrgDisplayName(o), rule: 'Missing Org Code', severity: 'warn' });
    }
  });
  return issues;
}

function roleRowMatchesUser(row){

  var userEmail = String(user.email || '').toLowerCase();
  var userLogin = String(user.loginName || '').toLowerCase();
  var userTitle = String(user.title || '').toLowerCase();
  if (member) {
    var memberEmail = String(member.EMail || member.Email || '').toLowerCase();
    var memberTitle = String(member.Title || '').toLowerCase();
    if ((member.Id && user.id && member.Id === user.id) || (memberEmail && memberEmail === userEmail) || (memberTitle && memberTitle === userTitle)) { return true; }
  }
  if (!principal) { return false; }
  if (principalType.toLowerCase().indexOf('user') >= 0) {
    return principal === userEmail || principal === userLogin || principal === userTitle || principalEmail === userEmail || principalTitle === userTitle || (principalId && principalId === String(user.id || '').toLowerCase());
  }
  if (principalType.toLowerCase().indexOf('sharepointgroup') >= 0 || principalType.toLowerCase().indexOf('m365group') >= 0 || principalType.toLowerCase().indexOf('group') >= 0) {
    return groups.some(function(g){

/* ─── Federal Holidays (US OPM schedule) ─── */
function getFederalHolidays(year){
  var y = year || new Date().getFullYear();
  var holidays = [];
  function add(m, d, name){ holidays.push({ date: new Date(y, m - 1, d), name: name }); }
  function observed(dt, name){
    var d = dt.getDay();
    if (d === 0) { dt = new Date(dt.getTime() + 86400000); }
    if (d === 6) { dt = new Date(dt.getTime() - 86400000); }
    holidays.push({ date: dt, name: name });
  }
  /* Fixed-date holidays (with observed shift for weekends) */
  observed(new Date(y, 0, 1), "New Year's Day");
  observed(new Date(y, 5, 19), 'Juneteenth');
  observed(new Date(y, 6, 4), 'Independence Day');
  observed(new Date(y, 10, 11), 'Veterans Day');
  observed(new Date(y, 11, 25), 'Christmas Day');
  /* Floating holidays */
  /* MLK: 3rd Monday of January */
  var jan1 = new Date(y, 0, 1); var mlk = 1 + ((8 - jan1.getDay()) % 7) + 14; add(1, mlk, 'MLK Jr. Day');
  /* Presidents' Day: 3rd Monday of February */
  var feb1 = new Date(y, 1, 1); var pres = 1 + ((8 - feb1.getDay()) % 7) + 14; add(2, pres, "Presidents' Day");
  /* Memorial Day: last Monday of May */
  var may31 = new Date(y, 4, 31); var mem = 31 - ((may31.getDay() + 6) % 7); add(5, mem, 'Memorial Day');
  /* Labor Day: 1st Monday of September */
  var sep1 = new Date(y, 8, 1); var lab = 1 + ((8 - sep1.getDay()) % 7); add(9, lab, 'Labor Day');
  /* Columbus Day: 2nd Monday of October */
  var oct1 = new Date(y, 9, 1); var col = 1 + ((8 - oct1.getDay()) % 7) + 7; add(10, col, 'Columbus Day');
  /* Thanksgiving: 4th Thursday of November */
  var nov1 = new Date(y, 10, 1); var thx = 1 + ((11 - nov1.getDay()) % 7) + 21; add(11, thx, 'Thanksgiving');
  return holidays;
}
function getHolidayMap(year){
  var holidays = getFederalHolidays(year);
  var map = {};
  holidays.forEach(function(h){ map[h.date.toISOString().slice(0, 10)] = h.name; });
  return map;
}

function trainingAppliesToPerson(training, person){
  if (!training) { return false; }
  var required = String(training.RequiredFor || '').toLowerCase();
  if (!required) { return normalizeBoolean(training.IsMandatory); }
  if (required === 'all' || required.indexOf('everyone') >= 0) { return true; }
  var tokens = required.split(/[;,\n]/).map(function(v){ return v.replace(/\s+/g,' ').trim(); }).filter(function(v){ return !!v; });
  var orgTitle = person && person.OrgID && person.OrgID.Title ? String(person.OrgID.Title).toLowerCase() : '';
  var orgId = person && person.OrgID && person.OrgID.Id ? String(person.OrgID.Id).toLowerCase() : '';
  var checks = [
    String(person && person.Category || '').toLowerCase(),
    String(person && person.Component || '').toLowerCase(),
    String(person && person.Rank || '').toLowerCase(),
    String(person && person.Grade || '').toLowerCase(),
    orgTitle,
    orgId,
    normalizeBoolean(person && person.IsSupervisor) ? 'supervisors' : '',
    normalizeBoolean(person && person.IsSupervisor) ? 'supervisor' : ''
  ].concat((APP.state.roleNames || []).map(function(r){ return String(r).toLowerCase(); }));
  return tokens.some(function(token){ return checks.some(function(c){ return c && (c === token || c.indexOf(token) >= 0 || token.indexOf(c) >= 0); }); });
}

function getMyTrainingModel(){
  var person = APP.state.currentPersonnel;
  var catalog = APP.state.data.trainingCatalog || [];
  var submissions = APP.state.data.trainingSubmissions || [];
  var latestRecords = getTrainingLatestRecordByTrainingId();
  var myPersonId = person ? person.Id : null;
  var myEmail = APP.state.currentUser ? String(APP.state.currentUser.email || '').toLowerCase() : '';
  var pendingByTraining = {};
  submissions.forEach(function(s){
    var sPersonId = s.PersonID && s.PersonID.Id ? s.PersonID.Id : null;
    var sEmail = s.Person && s.Person.EMail ? String(s.Person.EMail).toLowerCase() : '';

      var tid = s.TrainingID && s.TrainingID.Id ? s.TrainingID.Id : null;
      if (tid && String(s.Status || '').toLowerCase().indexOf('pending') >= 0) { pendingByTraining[tid] = s; }
    }
  });
  var rows = [];
  catalog.forEach(function(t){
    if (!normalizeBoolean(t.IsActive) && t.IsActive != null) { return; }
    var applicable = trainingAppliesToPerson(t, person || {});
    var latest = latestRecords[t.Id] || null;
    var pending = pendingByTraining[t.Id] || null;
    var status = 'Not Applicable';
    var dueText = '';
    if (pending) { status = 'Pending Review'; }
    else if (applicable) {
      if (!latest) { status = 'Missing'; }
      else {
        var exp = parseDate(latest.ExpirationDate);
        var d = daysUntil(exp);

        else if (d < 0) { status = 'Expired'; }
        else if (d <= 30) { status = 'Due Soon'; dueText = d + ' days'; }

function getTopTrainingRisks(rows, limit){
  rows = (rows || []).filter(function(r){ return r && r.applicable && (r.status === 'Missing' || r.status === 'Expired' || r.status === 'Due Soon' || r.status === 'Pending Review'); });
  rows.sort(function(a,b){
    function score(x){
      if (x.status === 'Expired') { return 1; }
      if (x.status === 'Missing') { return 2; }
      if (x.status === 'Due Soon') { return 3; }
      if (x.status === 'Pending Review') { return 4; }
      return 9;
    }
    var sa = score(a);
    var sb = score(b);
    if (sa !== sb) { return sa - sb; }
    var da = daysUntil(a.latest && a.latest.ExpirationDate);
    var db = daysUntil(b.latest && b.latest.ExpirationDate);
    da = da == null ? 99999 : da;
    db = db == null ? 99999 : db;
    return da - db;
  });
  return rows.slice(0, limit || 5);
}

function findPersonById(id){
  var rows = APP.state.data.people || [];

  return found;
}

function getOrgDisplayName(org){

}
function normalizeOrgCode(value){
  return String(value || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
}
function sortOrganizations(a, b){
  var ao = Number(a && a.OrgDisplayOrder);
  var bo = Number(b && b.OrgDisplayOrder);
  ao = isNaN(ao) ? 999999 : ao;
  bo = isNaN(bo) ? 999999 : bo;
  if (ao !== bo) { return ao - bo; }
  return String(getOrgDisplayName(a)).localeCompare(String(getOrgDisplayName(b)));
}
function buildOrgChartIndex(orgs, people, positions){
  var idx = {
    orgs: orgs || [],
    people: people || [],
    positions: positions || [],
    byId: {},
    positionsById: {},
    childrenByParentId: {},
    peopleByOrgId: {},
    peopleByPositionId: {},
    positionsByOrgId: {},
    roots: [],
    rollupMemo: {}
  };
  (idx.orgs || []).forEach(function(org){
    idx.byId[org.Id] = org;
    idx.childrenByParentId[org.Id] = idx.childrenByParentId[org.Id] || [];
    idx.peopleByOrgId[org.Id] = idx.peopleByOrgId[org.Id] || [];
    idx.positionsByOrgId[org.Id] = idx.positionsByOrgId[org.Id] || [];
  });
  (idx.positions || []).forEach(function(pos){
    idx.positionsById[pos.Id] = pos;
    var orgId = pos.OrgID && pos.OrgID.Id ? pos.OrgID.Id : null;
    if (orgId && idx.positionsByOrgId[orgId]) { idx.positionsByOrgId[orgId].push(pos); }
  });
  (idx.people || []).forEach(function(person){
    var orgId = person.OrgID && person.OrgID.Id ? person.OrgID.Id : null;
    var posId = person.PositionID && person.PositionID.Id ? person.PositionID.Id : null;
    if (orgId && idx.peopleByOrgId[orgId]) { idx.peopleByOrgId[orgId].push(person); }
    if (posId) {
      idx.peopleByPositionId[posId] = idx.peopleByPositionId[posId] || [];
      idx.peopleByPositionId[posId].push(person);
    }
  });
  (idx.orgs || []).forEach(function(org){
    var parentId = org.ParentOrgID && org.ParentOrgID.Id ? org.ParentOrgID.Id : null;
    if (parentId && idx.byId[parentId] && parentId !== org.Id) { idx.childrenByParentId[parentId].push(org.Id); }
    else { idx.roots.push(org.Id); }
  });
  Object.keys(idx.childrenByParentId).forEach(function(parentId){
    idx.childrenByParentId[parentId].sort(function(aId, bId){ return sortOrganizations(idx.byId[aId], idx.byId[bId]); });
  });
  idx.roots.sort(function(aId, bId){ return sortOrganizations(idx.byId[aId], idx.byId[bId]); });
  function computeRollup(orgId){
    var existing = idx.rollupMemo[orgId];
    if (existing) { return existing; }
    var directPeople = (idx.peopleByOrgId[orgId] || []).length;
    var directPositions = (idx.positionsByOrgId[orgId] || []).length;
    var children = idx.childrenByParentId[orgId] || [];
    var totalPeople = directPeople;
    var totalPositions = directPositions;
    var descendantOrgs = 0;
    children.forEach(function(childId){
      var childRoll = computeRollup(childId);
      totalPeople += childRoll.totalPeople;
      totalPositions += childRoll.totalPositions;
      descendantOrgs += 1 + childRoll.descendantOrgs;
    });
    idx.rollupMemo[orgId] = {
      directPeople: directPeople,
      totalPeople: totalPeople,
      directPositions: directPositions,
      totalPositions: totalPositions,
      childCount: children.length,
      descendantOrgs: descendantOrgs
    };
    return idx.rollupMemo[orgId];
  }
  idx.getRollup = computeRollup;
  return idx;
}
function getLeadershipScore(position, person){
  var title = String(position && (position.PositionTitle || position.Title) || '').toLowerCase();
  var level = String(position && position.PositionLevel || '').toLowerCase();
  var score = 0;
  if (normalizeBoolean(position && position.IsKeyLeadership)) { score += 45; }
  if (level === 'executive') { score += 36; }
  else if (level === 'manager') { score += 24; }
  else if (level === 'supervisory') { score += 14; }
  if (/division chief|group commander|commander/.test(title)) { score += 140; }
  if (/director/.test(title)) { score += 120; }
  if (/deputy/.test(title)) { score += 104; }
  if (/senior enlisted/.test(title)) { score += 98; }
  if (/executive officer|executive administrator|executive assistant/.test(title)) { score += 94; }
  if (/chief/.test(title)) { score += 86; }
  if (/superintendent/.test(title)) { score += 82; }
  if (/manager/.test(title)) { score += 72; }
  if (/supervisor/.test(title)) { score += 64; }
  if (/lead|officer in charge|flight chief|section chief|branch chief/.test(title)) { score += 58; }
  if (person && normalizeBoolean(person.IsSupervisor)) { score += 8; }
  return score;
}
function getLeadershipBucket(position){
  var title = String(position && (position.PositionTitle || position.Title) || '').toLowerCase();
  if (/division chief|group commander|commander/.test(title)) { return 1; }
  if (/director/.test(title)) { return 2; }
  if (/deputy/.test(title)) { return 3; }
  if (/senior enlisted/.test(title)) { return 4; }
  if (/executive officer|executive administrator|executive assistant/.test(title)) { return 5; }
  if (/chief/.test(title)) { return 6; }
  if (/superintendent/.test(title)) { return 7; }
  if (/manager|supervisor|lead|officer in charge|flight chief|section chief|branch chief/.test(title)) { return 8; }
  return 9;
}
function getOrgLeadership(orgId, idx){
  var positions = (idx.positionsByOrgId[orgId] || []).slice(0);
  var out = [];
  var seenPeople = {};
  var seenSlots = {};
  positions.forEach(function(position){
    var title = String(position.PositionTitle || position.Title || '');
    var titleLower = title.toLowerCase();
    var levelLower = String(position.PositionLevel || '').toLowerCase();
    var looksLikeLeader = normalizeBoolean(position.IsKeyLeadership) || levelLower === 'executive' || levelLower === 'manager' || levelLower === 'supervisory' || /commander|director|deputy|chief|superintendent|manager|supervisor|lead|officer in charge|flight chief|section chief|branch chief|division chief|senior enlisted|executive officer|executive administrator|executive assistant/.test(titleLower);
    if (!looksLikeLeader) { return; }
    var assigned = idx.peopleByPositionId[position.Id] || [];
    if (assigned.length) {
      assigned.forEach(function(person){
        if (seenPeople[person.Id]) { return; }
        seenPeople[person.Id] = true;
        out.push({ person: person, position: position, score: getLeadershipScore(position, person), bucket: getLeadershipBucket(position) });
      });
    } else if (!seenSlots[position.Id]) {
      seenSlots[position.Id] = true;
      out.push({ person: null, position: position, score: getLeadershipScore(position, null) - 10, bucket: getLeadershipBucket(position) });
    }
  });
  if (!out.length) {
    (idx.peopleByOrgId[orgId] || []).forEach(function(person){
      if (!normalizeBoolean(person.IsSupervisor)) { return; }
      if (seenPeople[person.Id]) { return; }
      seenPeople[person.Id] = true;
      out.push({ person: person, position: idx.positionsById[person.PositionID && person.PositionID.Id ? person.PositionID.Id : -1] || null, score: 35, bucket: 8 });
    });
  }
  out.sort(function(a, b){
    if (a.bucket !== b.bucket) { return a.bucket - b.bucket; }
    return b.score - a.score;
  });
  return out.slice(0, 10);
}
function getOrgBreadcrumb(index, orgId){
  var chain = [];
  var seen = {};
  var current = index.byId[orgId];
  while (current && !seen[current.Id]) {
    seen[current.Id] = true;
    chain.push(current);
    current = current.ParentOrgID && current.ParentOrgID.Id ? index.byId[current.ParentOrgID.Id] : null;
  }
  chain.reverse();
  return chain;
}
function getTopAncestorOrg(index, orgId){
  var chain = getOrgBreadcrumb(index, orgId);
  return chain.length ? chain[0] : null;
}
function getOrgsAboveRoot(index, rootOrg){
  var chain = getOrgBreadcrumb(index, rootOrg && rootOrg.Id ? rootOrg.Id : null);
  if (chain.length <= 1) { return []; }
  return chain.slice(0, chain.length - 1);
}
function getOrgSearchText(index, orgId){

  var parts = [org && org.OrgName, org && org.OrgID, org && org.OrgCode, org && org.OrgType, org && org.Title];
  leaders.forEach(function(l){
    if (l.person) { parts.push(formatPerson(l.person)); }
    if (l.position) { parts.push(l.position.PositionTitle || l.position.Title); }
  });
  return parts.join(' ').toLowerCase();
}
function orgBranchMatchesSearch(index, orgId, search, memo){
  if (!search) { return true; }
  if (memo[orgId] != null) { return memo[orgId]; }
  var selfMatch = getOrgSearchText(index, orgId).indexOf(search) >= 0;
  var children = index.childrenByParentId[orgId] || [];
  var childMatch = false;
  children.forEach(function(childId){
    if (orgBranchMatchesSearch(index, childId, search, memo)) { childMatch = true; }
  });
  memo[orgId] = !!(selfMatch || childMatch);
  return memo[orgId];
}

/* ─── Certification Expiration Alerts ─── */
function getCertExpirationAlerts(daysAhead){
  daysAhead = daysAhead || 90;
  var now = new Date(); now.setHours(0,0,0,0);
  var cutoff = new Date(now.getTime() + daysAhead * 86400000);
  var records = APP.state.data.trainingRecords || [];
  var catalog = APP.state.data.trainingCatalog || [];
  var catalogMap = {};
  catalog.forEach(function(t){ catalogMap[t.Id] = t; });
  var alerts = [];
  records.forEach(function(r){
    if (!r.ExpirationDate) { return; }
    var exp = new Date(r.ExpirationDate);
    if (exp < now || exp > cutoff) { return; }
    var daysLeft = Math.round((exp - now) / 86400000);
    var t = r.TrainingID ? catalogMap[r.TrainingID.Id || r.TrainingID] : null;
    alerts.push({ record: r, training: t, daysLeft: daysLeft, expirationDate: exp });
  });
  alerts.sort(function(a, b){ return a.daysLeft - b.daysLeft; });
  return alerts;
}

function wSla(days){
  var n = parseInt(days, 10);
  if (!n || isNaN(n)) { return ''; }
  var d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString();
}

function openSupervisorRequestDashboard(){
  Promise.all([ensureRequestsLoaded(), ensurePeopleLoaded()]).then(function(){
    var me = APP.state.currentPersonnel;
    if (!me) { toast('Current personnel not loaded.', 'danger'); return; }
    var myOrgId = me.OrgID ? (me.OrgID.Id || me.OrgID) : null;
    var orgIds = myOrgId ? getOrgAndDescendants(myOrgId) : {};

      var oid = p.OrgID ? (p.OrgID.Id || p.OrgID) : null;

    });
    var teamPeopleIds = {};

      var pid = r.PersonID ? (r.PersonID.Id || r.PersonID) : null;

      });

    var html = '<div class="tile-grid">';

    });

  var maxX = 0, maxY = 0;
  allSeats.forEach(function(s){ var x = Number(s.XCoord) || 0; var y = Number(s.YCoord) || 0; if (x > maxX) { maxX = x; } if (y > maxY) { maxY = y; } });

  var svgHtml = '<div style="overflow:auto;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.03)"><svg viewBox="0 0 ' + maxX + ' ' + maxY + '" style="width:100%;max-height:480px" role="img" aria-label="Seat map for ' + escAttr((room && room.RoomNumber) || 'room') + '">';
  allSeats.forEach(function(s){
    var x = Number(s.XCoord) || 0; var y = Number(s.YCoord) || 0;

}

/* ─── Floor Plan Load / Error / Pan / Zoom ─── */
function onFloorPlanLoad(){
  var img = document.getElementById('floorplanImg');
  var container = document.getElementById('floorplanContainer');
  if (!img || !container) { return; }
  var ui = ensureFacilityUi();
  var cw = container.clientWidth;
  var iw = img.naturalWidth;
  if (iw > cw) { ui.zoom = cw / iw; } else { ui.zoom = 1; }
  ui.panX = 0; ui.panY = 0;
  applyFloorPlanTransform();
  initFloorPlanInteraction();
}
function onFloorPlanError(){
  var container = document.getElementById('floorplanContainer');
  if (container) { container.innerHTML = '<div class="empty" style="padding:40px">Floor plan image failed to load. Check the URL or SharePoint permissions.</div>'; }
}
function applyFloorPlanTransform(){
  var inner = document.getElementById('floorplanInner');
  if (!inner) { return; }
  var ui = ensureFacilityUi();
  inner.style.transform = 'translate(' + ui.panX + 'px,' + ui.panY + 'px) scale(' + ui.zoom + ')';
}
function initFloorPlanInteraction(){
  var container = document.getElementById('floorplanContainer');
  if (!container || container._fpInit) { return; }
  container._fpInit = true;
  var ui = ensureFacilityUi();
  var dragging = false; var startX = 0; var startY = 0; var startPanX = 0; var startPanY = 0; var moved = false;
  var seatDragging = null; var seatDragStartX = 0; var seatDragStartY = 0; var seatOrigX = 0; var seatOrigY = 0; var seatMoved = false;
  container.addEventListener('mousedown', function(e){
    if (e.button !== 0) { return; }
    /* Seat drag in picker mode */
    if (ui.floorPlanMode === 'picker' && canSeeAdmin()) {
      var marker = e.target.closest ? e.target.closest('.seat-marker.draggable') : null;
      if (marker) {
        seatDragging = marker; seatMoved = false;
        seatDragStartX = e.clientX; seatDragStartY = e.clientY;
        seatOrigX = parseInt(marker.style.left, 10) || 0;
        seatOrigY = parseInt(marker.style.top, 10) || 0;
        marker.classList.add('dragging-seat');
        e.preventDefault(); e.stopPropagation();
        return;
      }
      return;
    }
    dragging = true; moved = false; startX = e.clientX; startY = e.clientY; startPanX = ui.panX; startPanY = ui.panY;
    container.classList.add('dragging');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    /* Seat dragging */
    if (seatDragging) {
      var dx = (e.clientX - seatDragStartX) / ui.zoom;
      var dy = (e.clientY - seatDragStartY) / ui.zoom;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) { seatMoved = true; }
      seatDragging.style.left = Math.round(seatOrigX + dx) + 'px';
      seatDragging.style.top = Math.round(seatOrigY + dy) + 'px';
      return;
    }
    /* Crosshair tracking in picker mode */
    if (ui.floorPlanMode === 'picker') {
      var chH = document.getElementById('fpCrosshairH');
      var chV = document.getElementById('fpCrosshairV');
      var coordsEl = document.getElementById('fpCoords');
      if (chH && chV) {
        var cr = container.getBoundingClientRect();
        var mx = e.clientX - cr.left; var my = e.clientY - cr.top;
        chH.style.top = my + 'px'; chV.style.left = mx + 'px';
        if (coordsEl) {
          var inner = document.getElementById('floorplanInner');
          if (inner) {
            var ir = inner.getBoundingClientRect();
            var rx = Math.round((e.clientX - ir.left) / ui.zoom);
            var ry = Math.round((e.clientY - ir.top) / ui.zoom);
            coordsEl.textContent = 'X: ' + rx + ', Y: ' + ry;
          }
        }
      }
    }
    if (!dragging) { return; }
    var ddx = e.clientX - startX; var ddy = e.clientY - startY;
    if (Math.abs(ddx) > 3 || Math.abs(ddy) > 3) { moved = true; }
    ui.panX = startPanX + ddx; ui.panY = startPanY + ddy;
    applyFloorPlanTransform();
  });
  document.addEventListener('mouseup', function(e){
    if (seatDragging) {
      seatDragging.classList.remove('dragging-seat');
      if (seatMoved) {
        var newX = parseInt(seatDragging.style.left, 10);
        var newY = parseInt(seatDragging.style.top, 10);
        var seatId = seatDragging.getAttribute('data-seat-id');
        saveSeatPosition(seatId, newX, newY);
      }
      seatDragging = null; seatMoved = false;
      return;
    }
    if (dragging) { dragging = false; container.classList.remove('dragging'); }
  });
  container.addEventListener('wheel', function(e){
    e.preventDefault();
    var delta = e.deltaY > 0 ? -0.1 : 0.1;
    ui.zoom = Math.max(0.15, Math.min(5, ui.zoom + delta));
    applyFloorPlanTransform();
  }, { passive: false });
  container.addEventListener('click', function(e){
    if (moved || seatMoved) { return; }
    if (ui.floorPlanMode === 'picker' && canSeeAdmin()) {
      var marker = e.target.closest ? e.target.closest('.seat-marker') : null;
      if (marker) { openSeatEditModal(marker.getAttribute('data-seat-id')); return; }
      handlePickerClick(e);
      return;
    }
    var viewMarker = e.target.closest ? e.target.closest('.seat-marker') : null;
    if (viewMarker) { showSeatTooltipPinned(viewMarker, e); }
  });
  container.addEventListener('mouseover', function(e){
    if (ui.floorPlanMode === 'picker') { return; }
    var marker = e.target.closest ? e.target.closest('.seat-marker') : null;
    if (!marker && e.target.classList && e.target.classList.contains('seat-marker')) { marker = e.target; }
    if (marker) { showSeatTooltip(marker, e); }
  });
  container.addEventListener('mouseout', function(e){
    if (ui.floorPlanMode === 'picker') { return; }
    var marker = e.target.closest ? e.target.closest('.seat-marker') : null;
    if (!marker && e.target.classList && e.target.classList.contains('seat-marker')) { marker = e.target; }
    if (marker) { hideSeatTooltip(); }
  });
}
function floorPlanZoom(direction){
  var ui = ensureFacilityUi();
  if (direction === 'in') { ui.zoom = Math.min(5, ui.zoom * 1.25); }
  else if (direction === 'out') { ui.zoom = Math.max(0.15, ui.zoom * 0.8); }
  else { onFloorPlanLoad(); return; }
  applyFloorPlanTransform();
}

/* ─── Seat Tooltip ─── */
function showSeatTooltip(marker, e){
  var raw = marker.getAttribute('data-seat-tooltip');
  if (!raw) { return; }
  var data; try { data = JSON.parse(raw); } catch(err) { return; }
  var tip = document.getElementById('seatTooltip');
  if (!tip) { return; }
  tip.style.pointerEvents = 'none';
  tip.innerHTML = buildSeatTooltipHtml(data, false);
  tip.style.display = 'block';
  positionTooltip(tip, marker);
}
function showSeatTooltipPinned(marker, e){
  var raw = marker.getAttribute('data-seat-tooltip');
  if (!raw) { return; }
  var data; try { data = JSON.parse(raw); } catch(err) { return; }
  var tip = document.getElementById('seatTooltip');
  if (!tip) { return; }
  var prev = document.querySelector('.seat-marker.selected');
  if (prev) { prev.classList.remove('selected'); }
  marker.classList.add('selected');
  tip.style.pointerEvents = 'auto';
  tip.innerHTML = buildSeatTooltipHtml(data, true);
  tip.style.display = 'block';
  positionTooltip(tip, marker);
}
function buildSeatTooltipHtml(data, showActions){
  var html = '<div class="st-name">' + escHtml(data.label) + '</div>';
  html += '<div class="st-row"><span class="st-label">Occupant</span><span>' + escHtml(data.occupant || 'Available') + '</span></div>';
  html += '<div class="st-row"><span class="st-label">Status</span><span>' + statusBadge(data.status) + '</span></div>';
  if (data.port) { html += '<div class="st-row"><span class="st-label">Port</span><span>' + escHtml(data.port) + '</span></div>'; }
  if (data.phone) { html += '<div class="st-row"><span class="st-label">Phone</span><span>' + escHtml(data.phone) + '</span></div>'; }
  if (data.vtc) { html += '<div class="st-row"><span class="st-label">VTC</span><span class="badge ok">Yes</span></div>'; }
  if (data.networks) { html += '<div class="st-nets">' + data.networks.split(' ').map(function(n){ return '<span class="badge info">' + escHtml(n) + '</span>'; }).join('') + '</div>'; }
  if (data.notes) { html += '<div class="st-row" style="margin-top:4px"><span class="mini muted">' + escHtml(data.notes) + '</span></div>'; }
  if (showActions && canSeeAdmin()) {
    html += '<div class="st-actions"><button data-action="edit-seat-inline" data-seat-id="' + escAttr(data.seatId) + '">Edit</button><button class="danger" data-action="delete-seat" data-seat-id="' + escAttr(data.seatId) + '">Delete</button></div>';
  }
  return html;
}
function positionTooltip(tip, marker){
  var rect = marker.getBoundingClientRect();
  tip.style.left = Math.min(rect.left + 20, window.innerWidth - 340) + 'px';
  tip.style.top = Math.max(10, rect.top - 10) + 'px';
}
function hideSeatTooltip(){
  var tip = document.getElementById('seatTooltip');
  if (tip) { tip.style.display = 'none'; tip.style.pointerEvents = 'none'; }
  var sel = document.querySelector('.seat-marker.selected');
  if (sel) { sel.classList.remove('selected'); }
}

    + formField('SIPR', '<select id="editSeatSIPR" class="select"><option value="Yes"' + (normalizeBoolean(seat.HasSIPR) ? ' selected' : '') + '>Yes</option><option value="No"' + (!normalizeBoolean(seat.HasSIPR) ? ' selected' : '') + '>No</option></select>')
    + formField('JWICS', '<select id="editSeatJWICS" class="select"><option value="Yes"' + (normalizeBoolean(seat.HasJWICS) ? ' selected' : '') + '>Yes</option><option value="No"' + (!normalizeBoolean(seat.HasJWICS) ? ' selected' : '') + '>No</option></select>')
    + formField('VTC Enabled', '<select id="editSeatVTC" class="select"><option value="Yes"' + (normalizeBoolean(seat.VTCEnabled) ? ' selected' : '') + '>Yes</option><option value="No"' + (!normalizeBoolean(seat.VTCEnabled) ? ' selected' : '') + '>No</option></select>')

    + '</div>';
  openModal('Edit Seat: ' + escHtml(seat.SeatLabel || 'Seat'), body,

    'Edit seat properties and assignments');
