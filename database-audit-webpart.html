<div id="ccsd-audit-root"></div>
<style>
#ccsd-audit-root{font-family:Segoe UI,sans-serif;max-width:1200px;margin:0 auto;padding:20px;color:#333}
.audit-header{background:#0d4f9b;color:#fff;padding:20px;border-radius:8px;margin-bottom:20px}
.audit-header h1{margin:0;font-size:22px}
.audit-header p{margin:5px 0 0;opacity:.8;font-size:13px}
.progress-bar{background:#e0e0e0;border-radius:4px;height:24px;margin:10px 0;overflow:hidden}
.progress-fill{background:#4caf50;height:100%;transition:width .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}
.summary-cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.card{flex:1;min-width:150px;padding:16px;border-radius:8px;text-align:center}
.card h2{margin:0;font-size:28px}.card p{margin:4px 0 0;font-size:13px}
.card-green{background:#e8f5e9;color:#2e7d32}.card-red{background:#ffebee;color:#c62828}
.card-yellow{background:#fff8e1;color:#f57f17}.card-blue{background:#e3f2fd;color:#1565c0}
.section{margin-bottom:16px;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}
.section-header{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px}
.section-header:hover{opacity:.85}
.section-body{padding:0 16px 16px;display:none}
.section-body.open{display:block}
.missing-list{background:#ffebee}.missing-list .section-header{background:#ef5350;color:#fff}
.partial-list{background:#fff8e1}.partial-list .section-header{background:#ff9800;color:#fff}
.ok-list{background:#e8f5e9}.ok-list .section-header{background:#4caf50;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th{background:#f5f5f5;text-align:left;padding:6px 8px;border-bottom:2px solid #ddd}
td{padding:6px 8px;border-bottom:1px solid #eee}
tr:hover{background:#f9f9f9}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px}
.tag-missing{background:#ffcdd2;color:#b71c1c}.tag-ok{background:#c8e6c9;color:#1b5e20}
.tag-type{background:#e3f2fd;color:#0d47a1}.tag-warn{background:#fff9c4;color:#f57f17}
.choice-diff{margin-top:4px;font-size:12px}
.choice-missing{color:#c62828;font-weight:600}.choice-extra{color:#1565c0}
.filter-bar{margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid #ccc;border-radius:16px;background:#fff;cursor:pointer;font-size:12px}
.filter-btn.active{background:#0d4f9b;color:#fff;border-color:#0d4f9b}
.cat-label{font-size:11px;padding:2px 6px;border-radius:4px;background:#e0e0e0;margin-left:8px}
</style>

var siteUrl=(typeof _spPageContextInfo!=='undefined'&&_spPageContextInfo.webAbsoluteUrl)
  ||window.location.origin+window.location.pathname.split('/').slice(0,4).join('/');

function spGet(url){
  return fetch(url,{headers:{Accept:'application/json;odata=verbose'},credentials:'include'})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});
}

function matchCol(expected,fields){
  var el=expected.toLowerCase();
  var noSp=el.replace(/[^a-z0-9]/g,'');
  var enc=expected.replace(/ /g,'_x0020_').toLowerCase();
  for(var i=0;i<fields.length;i++){
    var f=fields[i];
    var tl=f.Title.toLowerCase(), il=f.InternalName.toLowerCase();
    var tlc=tl.replace(/[^a-z0-9]/g,''), ilc=il.replace(/[^a-z0-9]/g,'');
    if(tl===el||il===el)return f;
    if(il===enc)return f;
    if(tlc===noSp||ilc===noSp)return f;
    if(il===el+'id'||il===el.replace(/id$/,'')+'id')return f;
  }
  return null;
}

var typeMap={'Text':'Text','Note':'Note','Choice':'Choice','MultiChoice':'MultiChoice',
  'Number':'Number','Currency':'Currency','DateTime':'DateTime','Boolean':'Boolean',
  'Lookup':'Lookup','User':'User','UserMulti':'UserMulti','URL':'URL','Computed':'Computed'};
var typeAliases={'User':['User','UserMulti'],'Lookup':['Lookup','LookupMulti'],
  'Note':['Note','Text'],'URL':['URL','Text'],'Text':['Text','Note','Computed']};

function typeOk(expected,actual){
  if(!expected||!actual)return true;
  if(expected===actual)return true;
  var aliases=typeAliases[expected];
  if(aliases&&aliases.indexOf(actual)>=0)return true;
  return false;
}

function auditList(def){
  var url=siteUrl+"/_api/web/lists/getbytitle('"+encodeURIComponent(def.n)+"')/fields?$filter=Hidden eq false&$top=500";
  return spGet(url).then(function(data){
    var fields=data.d.results;
    var results=[];
    def.cols.forEach(function(col){
      var f=matchCol(col.n,fields);
      var r={expected:col.n,expectedType:col.t,expectedChoices:col.c||null};
      if(f){
        r.found=true;r.actualTitle=f.Title;r.actualInternal=f.InternalName;r.actualType=f.TypeAsString;
        r.typeOk=typeOk(col.t,f.TypeAsString);
        if(col.c&&col.c.length&&f.Choices&&f.Choices.results){
          var actual=f.Choices.results;
          r.actualChoices=actual;
          r.missingChoices=col.c.filter(function(v){return actual.indexOf(v)<0;});
          r.extraChoices=actual.filter(function(v){return col.c.indexOf(v)<0;});
        } else if(col.c&&col.c.length&&(!f.Choices||!f.Choices.results)){
          r.missingChoices=col.c;r.extraChoices=[];r.actualChoices=[];
        } else {
          r.missingChoices=[];r.extraChoices=[];
        }
      } else {
        r.found=false;r.typeOk=false;r.missingChoices=col.c||[];r.extraChoices=[];
      }
      results.push(r);
    });
    return {name:def.n,cat:def.cat,exists:true,columns:results};
  }).catch(function(){
    return {name:def.n,cat:def.cat,exists:false,columns:def.cols.map(function(col){
      return {expected:col.n,expectedType:col.t,expectedChoices:col.c||null,found:false,typeOk:false,missingChoices:col.c||[],extraChoices:[]};
    })};
  });
}

// ===== RENDERER =====
function render(results){
  var missingLists=results.filter(function(r){return !r.exists;});
  var partialLists=results.filter(function(r){return r.exists&&r.columns.some(function(c){return !c.found||!c.typeOk||(c.missingChoices&&c.missingChoices.length);});});
  var okLists=results.filter(function(r){return r.exists&&!r.columns.some(function(c){return !c.found||!c.typeOk||(c.missingChoices&&c.missingChoices.length);});});
  var totalCols=0,foundCols=0,missingCols=0,typeMismatch=0,choiceIssues=0;
  results.forEach(function(r){r.columns.forEach(function(c){
    totalCols++;if(c.found)foundCols++;else missingCols++;
    if(c.found&&!c.typeOk)typeMismatch++;
    if(c.missingChoices&&c.missingChoices.length)choiceIssues++;
  });});

  var h='<div class="audit-header"><h1>CCSD Database Audit Report</h1>';
  h+='<p>Site: '+siteUrl+' &bull; Scanned: '+new Date().toLocaleString()+' &bull; '+S.length+' lists checked</p></div>';

  h+='<div class="summary-cards">';
  h+='<div class="card card-blue"><h2>'+S.length+'</h2><p>Total Lists</p></div>';
  h+='<div class="card '+(missingLists.length?'card-red':'card-green')+'"><h2>'+missingLists.length+'</h2><p>Missing Lists</p></div>';
  h+='<div class="card '+(missingCols?'card-red':'card-green')+'"><h2>'+missingCols+'</h2><p>Missing Columns</p></div>';
  h+='<div class="card '+(typeMismatch?'card-yellow':'card-green')+'"><h2>'+typeMismatch+'</h2><p>Type Mismatches</p></div>';
  h+='<div class="card '+(choiceIssues?'card-yellow':'card-green')+'"><h2>'+choiceIssues+'</h2><p>Choice Issues</p></div>';
  h+='<div class="card card-green"><h2>'+okLists.length+'</h2><p>Perfect Lists</p></div>';
  h+='</div>';

  // Filter bar
  h+='<div class="filter-bar">';
  h+='<button class="filter-btn active" onclick="filterAudit(\'all\',this)">All ('+S.length+')</button>';
  h+='<button class="filter-btn" onclick="filterAudit(\'missing\',this)">Missing Lists ('+missingLists.length+')</button>';
  h+='<button class="filter-btn" onclick="filterAudit(\'partial\',this)">Issues ('+partialLists.length+')</button>';
  h+='<button class="filter-btn" onclick="filterAudit(\'ok\',this)">Perfect ('+okLists.length+')</button>';
  h+='</div>';

  // Missing lists
  if(missingLists.length){
    h+='<h3 style="color:#c62828;margin:20px 0 10px">Missing Lists ('+missingLists.length+')</h3>';
    missingLists.forEach(function(r){
      h+='<div class="section missing-list" data-status="missing">';
      h+='<div class="section-header" onclick="toggleSection(this)"><span>'+r.name+'<span class="cat-label">'+r.cat+'</span></span><span>'+r.columns.length+' columns needed</span></div>';
      h+='<div class="section-body"><p style="color:#c62828;font-weight:600">This entire list needs to be created.</p>';
      if(r.columns.length){
        h+='<table><tr><th>Column Name</th><th>Expected Type</th><th>Choice Values</th></tr>';
        r.columns.forEach(function(c){
          h+='<tr><td>'+c.expected+'</td><td><span class="tag tag-type">'+c.expectedType+'</span></td>';
          h+='<td>'+(c.expectedChoices?c.expectedChoices.join(', '):'—')+'</td></tr>';
        });
        h+='</table>';
      }
      h+='</div></div>';
    });
  }

  // Partial lists
  if(partialLists.length){
    h+='<h3 style="color:#f57f17;margin:20px 0 10px">Lists With Issues ('+partialLists.length+')</h3>';
    partialLists.forEach(function(r){
      var mc=r.columns.filter(function(c){return !c.found;}).length;
      var tm=r.columns.filter(function(c){return c.found&&!c.typeOk;}).length;
      var ci=r.columns.filter(function(c){return c.missingChoices&&c.missingChoices.length;}).length;
      h+='<div class="section partial-list" data-status="partial">';
      h+='<div class="section-header" onclick="toggleSection(this)"><span>'+r.name+'<span class="cat-label">'+r.cat+'</span></span>';
      h+='<span>';
      if(mc)h+=mc+' missing ';
      if(tm)h+=tm+' type issues ';
      if(ci)h+=ci+' choice issues';
      h+='</span></div>';
      h+='<div class="section-body"><table><tr><th>Column</th><th>Status</th><th>Expected Type</th><th>Actual Type</th><th>Choice Issues</th></tr>';
      r.columns.forEach(function(c){
        if(!c.found||!c.typeOk||(c.missingChoices&&c.missingChoices.length)){
          h+='<tr><td><strong>'+c.expected+'</strong></td>';
          h+='<td>'+(c.found?'<span class="tag tag-ok">Found</span>':'<span class="tag tag-missing">MISSING</span>')+'</td>';
          h+='<td><span class="tag tag-type">'+c.expectedType+'</span></td>';
          h+='<td>'+(c.found?(c.typeOk?'<span class="tag tag-ok">'+c.actualType+'</span>':'<span class="tag tag-warn">'+c.actualType+'</span>'):'—')+'</td>';
          h+='<td>';
          if(c.missingChoices&&c.missingChoices.length){
            h+='<div class="choice-diff"><span class="choice-missing">Missing: '+c.missingChoices.join(', ')+'</span></div>';
          }
          if(c.extraChoices&&c.extraChoices.length){
            h+='<div class="choice-diff"><span class="choice-extra">Extra: '+c.extraChoices.join(', ')+'</span></div>';
          }
          if(!c.missingChoices||!c.missingChoices.length)h+='—';
          h+='</td></tr>';
        }
      });
      h+='</table></div></div>';
    });
  }

  // OK lists
  if(okLists.length){
    h+='<h3 style="color:#2e7d32;margin:20px 0 10px">Perfect Lists ('+okLists.length+')</h3>';
    okLists.forEach(function(r){
      h+='<div class="section ok-list" data-status="ok">';
      h+='<div class="section-header" onclick="toggleSection(this)"><span>'+r.name+'<span class="cat-label">'+r.cat+'</span></span><span>'+r.columns.length+' columns OK</span></div>';
      h+='<div class="section-body"><table><tr><th>Column</th><th>Type</th><th>Actual Name</th></tr>';
      r.columns.forEach(function(c){
        h+='<tr><td>'+c.expected+'</td><td><span class="tag tag-ok">'+c.actualType+'</span></td>';
        h+='<td>'+(c.actualTitle||'')+(c.actualInternal&&c.actualInternal!==c.actualTitle?' ('+c.actualInternal+')':'')+'</td></tr>';
      });
      h+='</table></div></div>';
    });
  }

  root.innerHTML=h;
}

window.toggleSection=function(el){
  var body=el.nextElementSibling;
  body.classList.toggle('open');
};
window.filterAudit=function(filter,btn){
  var btns=document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  btn.classList.add('active');
  var sections=document.querySelectorAll('.section');
  for(var i=0;i<sections.length;i++){
    var s=sections[i],st=s.getAttribute('data-status');
    if(filter==='all')s.style.display='';
    else if(filter==='missing')s.style.display=st==='missing'?'':'none';
    else if(filter==='partial')s.style.display=st==='partial'?'':'none';
    else if(filter==='ok')s.style.display=st==='ok'?'':'none';
  }
  // Also toggle section headers (h3)
  var h3s=document.querySelectorAll('#ccsd-audit-root h3');
  for(var i=0;i<h3s.length;i++)h3s[i].style.display=filter==='all'?'':'none';
};

// ===== RUN =====
root.innerHTML='<div class="audit-header"><h1>CCSD Database Audit</h1><p>Scanning '+S.length+' lists...</p></div><div class="progress-bar"><div class="progress-fill" id="audit-progress" style="width:0%">0%</div></div>';

var completed=0;
var allResults=[];
function runNext(i){
  if(i>=S.length){render(allResults);return;}
  auditList(S[i]).then(function(result){
    allResults.push(result);
    completed++;
    var pct=Math.round(completed/S.length*100);
    var pb=document.getElementById('audit-progress');
    if(pb){pb.style.width=pct+'%';pb.textContent=pct+'% ('+completed+'/'+S.length+') — '+S[i].n;}
    runNext(i+1);
  });
}
// Run 3 at a time for speed
var idx=0;
function runBatch(){
  if(idx>=S.length){
    if(allResults.length>=S.length)render(allResults);
    return;
  }
  var batch=[];
  for(var b=0;b<3&&idx<S.length;b++,idx++){
    batch.push(auditList(S[idx]));
  }
  Promise.all(batch).then(function(res){
    res.forEach(function(r){allResults.push(r);});
    completed+=res.length;
    var pct=Math.round(completed/S.length*100);
    var pb=document.getElementById('audit-progress');
    if(pb){pb.style.width=pct+'%';pb.textContent=pct+'% ('+completed+'/'+S.length+')';}
    runBatch();
  });
}
runBatch();

})();
</script>
